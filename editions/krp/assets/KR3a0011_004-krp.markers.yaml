  - {type: variant, offset: 5854, length: 0, content: '', WYG: 誠其心正其志實其事定其分心誠則神明應之况於萬民乎誠格幽明志正則天地順之况於萬民乎正通上下事實則功立表裏相顧分定則不淫思不出位曰才之實也行可為才不可也曰古之所以謂才也本今之所謂才也末也然則以行之貴也無失其才而才有失先民有言適楚而北轅者曰吾馬良用多御善此三者益侈其去楚亦逺矣此喻為不善而有才者遵路而騁應方而動不至於適楚北轅君子有行行必至矣此喻為善而有才者或問聖人所以為貴者才乎曰合而用之以才為貴如元愷之類才配乎徳體用兼全故聖人貴才分而行之以行為貴若徒有智能技藝而不本於徳末之尚矣舜禹之才而不為邪甚於缺一字矣此所謂合而用之以才為貴也舜禹之仁雖亡其才不失為良人哉此所謂分而行之以行為貴也或問進諌受諌孰難曰後之進諌難也以受之難故也後謂後世言臣畏犯顔由君拒諫而然若受諌不難則進諌斯易矣主明臣直或問知人自知孰難曰自知者求諸内而近者也反觀内省神明莫遁自知易也知人者求諸外而逺者也知人難哉密意深心矯言飾行知人難也若極其數也明有内以識有外以暗明於自知昩於知人全有内以隱有外以顯昩於自知明於知人然則知人自知人則可以自知未可以知人也急哉二者較之知人固難而自知為急也用已者不為異則異矣君子所惡乎異者三好生事也好生竒也好變常也好生事則多端而動衆好生竒則離道而惑俗好變常則輕法而亂度故名不貴苟傳行不貴苟難言生事生竒變常三者其名苟傳之名其行苟難之行何貴之有權為茂矣其幾不若經權不如經辯為美矣其理不若絀辯不如絀老子曰大辯若訥文為顯矣其中不若樸文不如樸博為盛矣其正不若約博不如約莫不為道道當作大知道之體大之至也莫不為妙知神之幾妙之至也莫不為正知缺一字之缺一字正之至也故君子必存乎三至弗至斯有守無誖焉或問守曰聖典而已矣聖典謂六經若夫百家者是謂無守莫不為言要其至矣莫不為徳𤣥其奥矣莫不為道聖人其𢎞矣言聖典百家皆言皆徳皆道而唯聖典為至為奥為𢎞也聖人之道其中道乎是為九達爾雅曰九達之謂逵謂四道交出復有旁通也言聖道無所不達百家則私蹊曲徑而已或曰辭達而已矣聖人以文其隩也有五曰𤣥曰妙曰包曰要曰文幽深謂之𤣥渾渾若川不可窮測理微謂之妙奥發天地幾宣鬼神數博謂之包辭兼費隱義徹上下辭約謂之要簡而不繁要而不縟章成謂之文炳若丹青光如日月聖人之文成此五者故曰不得已君子樂天知命故不憂易繫辭文仁故不憂審物明辨故不惑知故不惑定心致公故不懼勇故不懼若乃所憂懼則有之憂已不能成天性也懼已惑之憂不能免天命無惑焉或問性命曰生之謂性也形神是也此本告子之説以氣言性莊子曰性者生之質也所以立生終生者之謂命}
