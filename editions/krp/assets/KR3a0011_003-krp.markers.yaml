  - {type: variant, offset: 0, length: 830, content: 申鑒卷第三吳郡黃省曾注俗嫌第三或問卜筮曰德斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損凶吉以恊吉而消凶否則反是謂兆數之所值言脩德則足或問曰時羣忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈亡商家門不冝南向徵家門不冝北向之類漢時俗有方忌如西益宅謂之不祥必有死也是故甲子昧爽殷滅周興受率其旅若林㑹武成曰甲子昧爽北血流漂杵一戎衣天下大定所謂殷以甲于牧野罔有敵於我師前徒倒弋攻於後以言支干不足忌矣子滅周以甲子興也咸陽之地秦亡漢隆都秦年四百言相地家不足信矣關中二世而亡漢遷長安歴或問五三之位周應也熒惑太白嵗星填星五三五星三辰辰星析木月在天駟辰在斗柄星在天黿是也春日月斗也志所謂周師初發嵗在鶉火日在於房房者蒼神之精周據而興秋元命苞曰殷紂之時五星聚龍虎作尾虎當之㑹晉祥也曰童謡有之曰丙之晨龍尾伏辰晉獻公問於十偃曰攻虢何月也中成軍虢公其奔火中而旦其九月十月之均服振振取虢之旂鶉之賁賁天䇿焞焞火也伏隱也辰日月之交㑹也魯僖五年冬周交乎韋氏解曰丙丙子晨蚤朝也龍尾尾星䇿也伏辰辰在龍尾隱而未見也鶉鶉火鳥十二月夏十月丙子朔之朝日在尾月在天天䇿一名傳說焞焞近日月之貌也火鶉火星也賁賁鶉火星貌也天䇿尾上一星名曰十二月丙子朔晉滅虢虢公醜奔京師也中晨中也成軍軍有成功也傳曰冬曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也府則爵不符貞良而入獄犴則罰不受以布衣無位者貞良無罪者言布衣而寓官王獻公能當之也喻周應晉祥惟武或曰然則日月可廢歟曰否曰元辰先王所用也枵至星紀是也周禮辰謂日月所㑹自玄十有二月十有二辰馮相氏掌十有二嵗人承天地故動静焉順順其隂陽順其日辰順其度數内有順實外有順文文實順理也休徴之符自然應也故盜泉朝歌孔墨不由渴矣而不飲惡其名也尸子曰孔子過於盗泉歌墨子囘車劉向曰邑號朝惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也也如祈年祈請求禱太提掌六祈以同鬼神示祈子孫請雨請福之類周禮故精以底之犠, WYG: ''}
