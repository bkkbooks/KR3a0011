  - {type: variant, offset: 0, length: 270, content: 申鑒卷第五吳郡黃省曾注雜言下第五衣裳服者不昧於塵塗愛也衣裳者身之法昧汚闇塗泥也可不潔象固不衣裳愛焉而不愛其容止外矣者人容止不可不正之符表尤容止愛焉而不愛其言行末矣行言尤不可不慎者人之樞機言行愛焉而不愛其明淺矣者明不可不瑩心之神哲尤故君子本神為貴神和德平而道通是為保真人之所以立德者三一曰貞二曰達三曰志貞以為質主也質實也達以行之志以成之君子哉必不得已也守一於兹貞其主也人之所以立檢者四誠其心正其志實其事定其分心誠則神明應之況於萬民乎幽明誠格志正則天地順之況於萬物乎上下正通事實則功立相顧表裏分定則不淫出位思不曰才之實也行可為才不可也曰古之所以, WYG: ''}
