body:
  text: 䟦申鍳注後右荀悅申鍳五卷乃吳郡黄文學勉之所注也漢史載悅為獻帝黄門侍郎是時政移曹操故申漢故事以為帝鍳及泄所藴負共五篇以上一曰政體二曰時事三曰俗嫌四曰雜言上五曰雜言下皆深切時弊關治化人君所當遵行者悅之用心可謂勤矣勉之感其所遭而先帝之時適有姧臣心迹如操者竊弄威柄遂憤激為注此書共得萬四千餘言中所引據又皆漢事尤為博洽少傅守谿王公謂其有感而為者誠然㢤昔揚雄自言所著太玄經後世必有知子雲者今觀勉之之注殆亦深知荀悅者與正德􅉝巳冬十一月望白巗山人喬宇識
