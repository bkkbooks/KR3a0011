front:
  text: 申鑒卷第五
  hash: sha256:0fba1147eb74fe8ff3657bcccdaab9c26bcc1f0c773e1d710b6117b31bd7021f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0011_SBCK_005-1a}
body:
  text: 吳郡黃省曾注雜言下第五衣裳服者不昧於塵塗愛也衣裳者身之法昧汚闇塗泥也可不潔象固不衣裳愛焉而不愛其容止外矣者人容止不可不正之符表尤容止愛焉而不愛其言行末矣行言尤不可不慎者人之樞機言行愛焉而不愛其明淺矣者明不可不瑩心之神哲尤故君子本神為貴神和德平而道通是為保真人之所以立德者三一曰貞二曰達三曰志貞以為質主也質實也達以行之志以成之君子哉必不得已也守一於兹貞其主也人之所以立檢者四誠其心正其志實其事定其分心誠則神明應之況於萬民乎幽明誠格志正則天地順之況於萬物乎上下正通事實則功立相顧表裏分定則不淫出位思不曰才之實也行可為才不可也曰古之所以謂才也本今之所謂才也末也然則以行之貴也無失其才而才有失先民有言適楚而北轅者曰吾馬良用多御善此三者益侈其去楚亦逺矣而有才者此喻為不善遵路而騁應方而動於適不至轅楚北君子有行行必至矣而有才者此喻為善或問聖人所以為貴者才乎曰合而用之以才為貴體用兼全故聖人貴才如元愷之類才配乎徳分而行之以行為貴不本於徳末之尚矣若徒有智能技藝而舜禹之才而不為邪甚於字缺矣之以才為貴也此所謂合而用舜禹之仁雖亡其才不失為良人哉之以行為貴也此所謂分而行或問進諌受諌孰難曰後之進諌難也以受之難故也顔由君拒諫而然後謂後世言臣畏犯若受諌不難則進諌斯易矣臣直主明或問知人自知孰難曰自知者求諸内而近者也莫遁自知易也反觀内省神明知人者求諸外而逺者也知人難哉飾行知人難也密意深心矯言若極其數也明有内以識有外以暗昧於知人明於自知全有内以隱有外以顯明於知人昧於自知然則知人自知人則可以自知未可以知人也急哉固難而自知為二者較之知人也急用已者不為異則異矣君子所惡乎異者三好生事也好生奇也好變常也好生事則多端而動衆好生奇則離道而惑俗好變常則輕法而亂度故名不貴苟傳行不貴苟難之名其行苟難之行何貴之有言生事生奇變常三者其名苟傳權爲茂矣其幾不若經如經權不辯爲美矣其理不若絀不辯大辯若訥如絀老子曰文爲顯矣其中不若樸如樸文不博爲盛矣其正不若約如約愽不莫不爲道作大道當知道之體大之至也莫不爲妙知神之幾妙之至也莫不爲正知字缺一之字缺一正之至也故君子必存乎三至弗至斯有守無誖焉或問守曰聖典而已矣六經聖典謂若夫百家者是謂無守莫不為言要其至矣莫不為徳玄其奥矣莫不為道聖人其弘矣皆言皆徳皆言聖典百家至為奥為弘也道而唯聖典為聖人之道其中道乎是為九達通也言聖道無所不逹百家則私蹊曲徑爾雅曰九達謂之逹謂四道交出復有旁已而或曰辭逹而已矣聖人以文其隩也有五曰玄曰妙曰包曰要曰文幽深謂之玄川不可渾渾若也吉凶是也福之類此亦以氣言命吉凶貧富貴賤壽夭禍夫生我之制性命存爾君子循其性以輔其命休斯承否斯守凶吉無務焉無怨焉貧賤無怨富貴無務好寵者乘天命以驕乘富貴之命而驕則踰好寵者為勢位所溺故事興矣節陵分之好惡者違天命以濫寒所逼故違好惡者為饑且邪僻之行作矣貧賤之命而濫則苟故驕則奉作承奉當之不成承休不成濫則守之不終守否不終好以取怠惡以取甚務以取福惡作怨惡當以成禍則濫故曰成禍怨則不守不守斯惑矣或問天命人事曰有三品焉上下不移其中則人事存焉爾命相近也事相逺也則吉凶殊矣命無不善不當云相近矣孔子曰性相近也今既曰命故曰窮理盡性以至於命詞文易繫孟子稱性善荀卿稱性惡之性本惡其善者偽也荀子有性惡篇大抵言人公孫子曰性無善惡揚雄曰人之性善惡渾人之性也善惡揚子脩身篇曰惡人氣也者所適善惡之焉與混脩其善則為善人脩其惡則為劉向曰性情相應性不獨善情不獨惡者情亦善情惡向之意以性善故曰相應者性必惡曰問其理曰性善則無四凶共工四凶苗鯀也驩兠三性惡則無三仁謂微子箕子比干也孔子曰殷有三仁焉人無善惡文王之教一也則無周公管蔡公周皆武王同母兄弟旦管叔鮮蔡叔度性善情悪是桀紂無性而堯舜無情也性善惡皆渾是上智懷惠作惡惠當而下愚挾善也理也未究矣唯向言為然子韓有類於此三品之説或曰仁義性也好惡情也仁義常善而好惡或有惡故有情惡也曰不然好惡者性之取舍也實見於外故謂之情爾必本乎性矣仁義者善之誠者也何嫌其常善好惡者善惡未有所分也何怪其有惡凡言神者莫近於氣有氣斯有形有神斯有好惡喜怒之情矣故人作神人當有情由氣之有形也氣有白黑神有善惡形與白黑偕隨氣而有形之白黒情與善惡偕劉向性情相應之説情之善惡隨神而彰即故氣黒非形之咎情作神情當惡非情之罪也情之惡本於性也悦言形之黒本於氣或曰人之於利見而好之能以仁義為節者是性割其情也性少情多性不能割其棈則情獨行爲惡矣曰不然是善惡有多少也非情也有人於此嗜酒嗜肉肉勝則食焉酒勝則飲焉此二者相與爭勝者行矣食飲行謂非情欲得酒性欲得肉也有人於此好利好義義勝則義取焉利勝則利取焉此二者相與争勝者行矣義取利行謂取非情欲得利性欲得義也其可兼者則兼取之其不可兼者則隻取重焉若苟隻好而已雖可兼取闕文當有矣若二好鈞平無分輕重則一俯一仰乍進乍退不定相持或曰請折於經曰易稱乾道變化各正性命是言萬物各有性也性命保合大和乃利貞乾彖曰乾道變化各正觀其所感而天地萬物之情可見矣是言情者應感而動者也生聖人感人心而天下和咸彖曰天地感而萬物化萬物之情可見矣平觀其所感而天地昆蟲草木皆有性焉不盡善也獨惡之説此復申情不天地聖人皆稱情焉不主惡也獨善之説此復申性不又曰爻彖以情言亦如之象告爻彖以情言易繫詞曰八卦以凡情意心志者皆性動之别名也情見乎辭是稱情也人之情見乎易繫詞曰聖辭言不盡意是稱意也盡言言不盡意易繫詞曰書不中心好之是稱心也嘉賔中心好之詩彤弓曰我有以制其志是稱志也惟所冝各稱其名而巳情何主惡之有故曰必也正名或曰善惡皆性也則法教何施曰性雖善待敎而成性雖惡待法而消唯上智下愚不移文論語其次善惡交爭於是敎扶其善法抑其惡得施之九品從敎者半畏刑者四分之三其不移大數九分之一也一分之中又有微移者矣然則法教之於化民也幾盡之矣及法教之失也其為亂亦如之或曰法教得則治法教失則亂若無得無失縱民之情則治亂其中乎曰凡陽性升隂性降升難而降易善陽也惡隂也故善難而惡易縱民之情使自由之則降於下者多矣無若者易故多法教則為惡曰中焉在曰法教不純有得有失則治亂其中矣純德無慝其上善也伏而不動其次也動而不行行而不逺逺而能復又其次也之於外逺則行而不返動謂惡之萌動行則見其下者逺而不近也凡此皆人性也制之者則心也動而抑之隱㣲遏於行而止之履踐禁於與上同性也行而弗止逺而弗近與下同終也君子嘉仁而不責惠尊禮而不責意貴德而不責怨其責也先已而行也先人淫惠曲意私怨此三者實枉貞道亂大德然成敗得失莫匪由之救病不給其竟奚暇於道德哉此之謂末俗故君子有常交曰義也有常誓曰信也交而後親誓而後故狹矣大上不異古今其次不異海内同天下之志者其盛德乎大人之志不可見也浩然而同於道志渾合大人之可窺量造化故不衆人之志不可掩也察然而流於俗俗故易於照鑒衆庶之志流順世同於道故不與俗浮沈道故超俗言大人合或曰脩行者不為人恥諸神明其至也乎曰未也自恥者本也恥諸神明其次也恥諸人外矣夫唯外則慝積於内矣故君子審乎自恥行而幽明無怍矣能自愧恥則必能脩或曰恥者其志者乎曰未也夫志者自然由人何恥之有赴谷必墜失水必溺人見之也赴穽必陷失道必沈人不見之也不察之故君子慎乎所不察不聞大論則志不弘不聽至言則心不固思唐虞於上世瞻仲尼於中古而知夫小道者之足羞也想伯夷於首陽省四皓於商山而知夫穢志者之足恥也存張騫於西極使月氏與堂邑氏奴甘父俱出張騫漢中人建元中為郎應募嵗騫亡至大宛為發譯道抵康居康居傳致隴西徑匈奴匈奴得之傳詣單于留騫十餘歸復為匈奴所得留嵗餘單于死國中亂騫大月氏至大夏留嵗餘還並南山欲從羌中初騫行時百餘人去十三嵗惟二人得還與胡妻及堂邑父俱亡歸漢拜騫太中大夫念蘇武於朔垂方也朔北而知懷閭室者之足鄙也推斯類也無所不至矣德比於上聖賢上謂欲比於下貧賤下謂徳比於上故知恥欲比於下故知足恥而知之則聖賢其可幾知足而已則固陋其可安也聖賢斯幾况其為慝乎邪慝必無固陋斯安况其為侈乎放侈必無是謂有檢純乎純哉其上也其次得概而已矣莫匪概也得其概苟無邪斯可矣君子四省其身怒不亂德喜不字缺一義也申鑒卷第五終
