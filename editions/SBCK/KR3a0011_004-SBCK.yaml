  text: 申鑒卷第四
  hash: sha256:9a749dbdc194e064a3f2e701f0d92fd5bfb21943067deaf1c204513722a6bacc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0011_SBCK_004-1a}
body:
  text: 吳郡黃省曾注雜言上第四或問曰君子曷敦乎學也敦勉曰生而知之者寡矣學而知之者寡矣悠悠之民泄泄之士明明之治汶汶之亂皆學廢興之由敦之不亦冝乎泄泄大明曰明明在下詩板曰天之方蹶無然君子有三鑒世人鏡鑒鏡鑒而已蒸庶但知前惟順人惟賢鏡惟明之三鑒此君子夏商之衰不鑒於禹湯也以前鑒桀紂不周秦之弊不鑒於民下也亥不以幽厲政鑒人側弁垢顔不鑒於明鏡也側傾也弁者冠此則不以鏡鑒筵曰側弁之俄之大名詩賔之初故君子惟鑒之務鑒人鑒務於前若夫側景之鏡亡鑒矣是為無鑒但知鏡鑒或問致治之要君乎曰兩立哉君無獨理天無獨運非天地不生物非君臣不成治首之者天地也統之者君臣也哉先王之道致訓焉故亡斯須之間而違道矣昔有上致聖由教戒因輔弼欽順四鄰故檢柙之臣不虚於側法度也檢柙猶常充左右也言法度之臣禮度之典不曠於目先哲之言不輟於身非義之道不宣於心是邪僻之氣末由入也字缺一有間字缺一必有入之者矣是故僻志萌則僻事作害於其政生於其心僻事作則正塞正塞則公正亦末由入也矣不任不愛謂之公惟公是從謂之明齊桓公中材也末能成功業由有異焉者矣妾媵盈宫非無愛幸也羣臣盈朝非無親近也然外則管仲射已人殺雍林發兵送公子糾而使管仲别將兵遮莒道射無知髙國先隂召小白於莒魯聞無知死亦入齊髙傒立之是為桓公中小白帶鈎小白佯死先衞姬色妾内多内桓公好姬鄭姬葛嬴潘密姬宋華子也寵如夫人者六人長衞姬少衞非愛也任之也欲其擔寄國事也言桓公非親暱管仲然後知非賢不可任非智不可從也夫此之舉弘矣哉膏盲純白肓鬲也心下為膏二豎不生兹謂心寧省闥淸淨嬖孽不生兹謂政平夫膏盲近心而處阨鍼之不逺作達逺當藥之不中攻之不可二豎藏焉是謂篤患之未至公夢疾為二豎于曰彼良醫晉侯疾病求醫于秦秦伯使醫緩為若我何醫至曰疾不可為也在肓之上膏之也懼傷我焉逃之其一曰居肓之上膏之下藥不至焉不可為也下攻之不可達之不及故治身治國者唯是之畏國畏嬖孽身畏二豎或曰愛民如子仁之至乎曰未也曰愛民如身仁之至乎曰未也湯禱桑林年太史占之湯時大旱七人禱吾請自當遂齋戒翦髪㫁爪素車白馬曰當以人禱湯曰吾所為請雨者民也若以犧禱于桑林之野身嬰白茅以身為邾遷于繹繹史曰利於民邾文公卜遷干生民而樹之君以利之也民既利矣孤必與而不利於君邾子曰苟利於民孤之利也天養民死之短長時也民苟利矣遷也吉莫如焉左右曰命可長也君何弗為邾子曰命在月邾文公卒之遂遷于繹五景祠于旱祟在髙山廣水欲齊大旱景公卜之宫殿􅁀露與靈山河伯共憂其幸而雨乎於祠靈山河伯以禱晏子曰祠之無益君誠避天果大雨民盡得種樹是景公出野􅁀露三日可謂愛民矣子等耳如子與者輕身重民然後為至如身與身等耳如三君曰何重民而輕身也曰人主承天命以養民者也民存則社稷存民亡則社稷亡故重民者所以重社稷而承天命也指原隰之祗古者立國天子諸侯大社者五土之神稷者於五土之中特羊傳云亡國之社掩其上柴其下孟子曰民夫皆立社而國喪則屋之不受天陽也故公之重民為欽奉天命以保社稷也為貴社稷次之君為輕言三君者或問曰孟軻稱人皆可以為堯舜其信矣曰人非下愚不移下愚則則愚可以為堯舜矣寫堯舜之貌同堯舜之姓則否服堯之制行堯之道則可矣行之於前則古之堯舜也行之於後則今之堯舜也或曰人皆可以為桀紂乎曰行桀紂之事是桀紂也曹交意本孟子語堯舜桀紂之事常並存於世唯人所用而已楊朱哭岐路所通逼者然也見逵路而哭之為其可淮南子説林訓曰楊子曰閔其别與化也以南可以北髙誘夫岐路惡足悲哉中反焉若夫縣度之厄素舉足而已矣國西有縣度西域傳烏秘繩索相引而度去喻為桀紂縣度者石山也谿谷不通以損益之符微而顯也趙獲二城臨饋而憂陶朱既富室妾悲號扁舟浮於江湖變名易姓范蠡既雪㑹稽之恥乃乗與時逐三致千金而再散分與貧友昆弟後適齊為鴟夷子皮之陶為朱公廼治産積居遂至鉅萬故言富者稱陶朱年衰老聽子孫􅁱業而息之此知益為損之為益者也屈伸之數隱而昭也有仍之困復夏之萌也羿滅夏氏時少康方在相后懷姙帝相之后有仍國君女也寒浞殺有舊臣靡自有鬲氏收二國之燼舉兵滅浞乃奔歸有仍之國而生少康長為仍牧正夏少康而立鼎雉之異興殷之符也飛雉升鼎耳而武丁祭成湯有年蠻夷編髪重譯來朝者六國􅀑方無道武雊祖已訓諸王武丁內反諸巳以思王道三之殷道復興丁伐而三年克邵宮之難隆周之應也召公邵宮國人聞而圍之召公乃以其子代太子太子之室也厲王出犇于彘太子靜匿召公之家相乃共立之是爲宣王竟得脫長於召公家二㑹稽之棲霸越之基也越王勾踐乃以餘兵五千人保棲於㑹稽夫差二年吳王悉精兵以伐越敗之夫椒妾至十四年勾踐伐吳虜太子友二十一年使大夫種因吳太宰嚭而行成請委國爲臣差自剄死越王滅吳夫子之之亂强燕之徴也讓國於燕王噲死子之亡二年而燕人共立太子平是爲燕其相子之而國大亂齊因我之遂大勝燕噲王昭此知伸爲屈之爲伸者也人主之患常立於二難之間在上而國家不治難也治國家則必勤身苦思矯情以從道難也有難之難闇主取之無難之難明主居之大臣之患常立於二罪之間在職而不盡忠直之道罪也盡忠直之道焉則必矯上拂下罪也有罪之罪直之道謂不盡忠邪臣由之無罪之罪矯上拂下謂盡道而忠臣置之人臣之義不曰吾君能矣不我須也言無補也而不盡忠不曰吾君不能矣不我識也言無益也而不盡忠不能謂之賊孟子曰吾君必竭其誠明其道盡其義斯已而已矣事君以道不已則奉身以退則止不可臣道也故君臣有異無乖有怨無憾有屈無辱人臣有三罪一曰導非二曰阿失三曰尸寵以非引上謂之導從上之非謂之阿見非不言謂之尸導臣誅阿臣刑尸臣絀貶下也絀與黜同進忠有三術一曰防導反防與二曰救阿反救與三曰戒與戒反尸先其未然謂之防發而止之謂之救行而責之謂之戒防為上救次之戒為下下不鉗口上不塞耳則可有聞矣有鉗之鉗猶可解也無鉗之鉗難矣哉有塞之塞猶可除也無塞之塞其甚矣夫塞獻帝之時如此無鉗之鉗無塞之或曰在上有屈乎曰在上者以義申以義屈義當屈則屈義當申則申髙祖雖能申威於秦項而屈於商山四公先生也髙祖欲易太子大臣多爭四公東園公綺里季夏黄公角里不能致者遂使人奉太子書迎至及宴置酒未能得堅决吕后以留侯計云四公皆上所言其姓名上廼驚曰吾求公避逃我今公何太子侍四人者從太子上怪問四人前對各義不辱故恐而亡匿今聞太子仁孝恭敬愛自從吾兒遊乎四人曰陛下輕士善罵臣等上曰煩公幸卒調護太子四人趨去上目送士天下莫不延頸願為太子死者故臣等來輔羽翼已成難動矣竟不易太子所謂屈於之召戚夫人指視曰我欲易之彼四人為之四公商山光武能申於莽而屈於强項令宣為雒陳留董格殺之主訴帝帝召宣欲箠殺之宣曰陛下陽令湖陽公主蒼頭白日殺人宣於夏門亭不須箠請得自殺即以頭擊楹流血被面帝聖徳中興而縱奴殺人將何以治天下乎臣頓之宣兩手據地終不肯俯因敕强項令出令小黄門持之使宣叩頭謝主宣不從彊使謂屈於强項令賜錢三十萬所明帝能申令於天下而屈於鍾離尚書書時交阯太守張恢坐臧徵還伏尚書鍾離意也顯宗即位徴為尚璣悉以委地而不拜賜帝怪而問其故對曰法以資物簿入大司農詔班賜羣臣意得珠母之閭惡其名也此臧穢之寶誠不敢拜帝臣聞孔子忍渴於盗泉之水曽參回車於勝賜意轉為尚書僕射車駕數幸廣盛苑意以嗟嘆曰清乎尚書之言乃更以庫錢三十萬事天子即時還宫所謂屈於鍾離尚書為從禽廢政常當車陳諫般樂遊田之若秦二世之申欲而非笑唐虞子曰堯舜采椽不二世曰吾聞之韓觳於此禹鑿龍門通大夏決河亭水放之海刮茅茨不翦飯土塯啜土􅄱雖監門之養不凡所為貴有天下者得肆意極欲主重明法身自持築臿脛毋毛臣虜之勞不烈於此矣為天子親處窮苦之實以徇百姓尚何於法下不敢為非以制御海内矣夫虞夏之主貴笑唐虞也此所謂非若定陶傅太后之申意而怨於鄭王歸國稱定陶太后成帝無繼嗣太后賂趙傅太后元帝倢伃也生定陶恭王元帝崩隨王妃明年徴定陶王為六子是為哀帝帝即昭儀隂為恭王子求漢嗣又以從弟晏子為孟子喜中叔子晏幼君子商同母弟鄭煇子位累尊太后為皇太太后太后父同産弟子后語至謂之嫗䧟馮太后以祝詛罪令自殺業俱封侯太后既尊後尤驕與成帝母王太王母復奏發傅太后􅃁以木棺代去珠玉衣哀帝崩王莽秉政奏貶傅太后號為定陶恭合浦宗族皆歸故郡趙皇后亦廢為庶人歸定陶葬恭王􅃁次孔鄉侯晏將家屬徙是謂不屈不然則趙氏不亡而秦無愆尤故人主以義申以義屈也喜如春陽怒如秋霜威如雷霆之震惠若雨露之降喜惠言屈威怒言申沛然孰能禦也或問曰難行曰若髙祖聽戍卒不懷居遷萬乘不俟終日輅衣羊裘因虞將軍見髙阻勸齊人婁敬戍隴西過洛陽脫輓租即日車駕西都長安都秦地張良又是其説髙孝文帝不愛千里馬車在後吉行日五十里師行日三十里朕孝文時有獻千里馬者帝曰鸞旗在前屬安之下詔不受乘千里馬獨先慎夫人衣不曵地帝身衣弋班固贊文人衣不曵地綈所幸慎夫光武手不持珠玉光武身衣大循吏傳叙曰之音手不持珠玉之玩練色無重綵耳不聽鄭衛可謂難矣者以規言三君也獻帝抑情絶欲不如是能成功業者鮮矣人臣若金日磾以子私謾而殺之皆愛為帝弄日磾子二人見之惡其淫亂遂殺弄兒卽日磾長子也兒其後壯大不謹自殿下興宫人戲日磾適丙吉之不伐巫蠱郡邸獄時宣帝生數月以武帝末吉以故廷尉監徴詔治厚女徒令保養曾孫置閒燥處望氣者言長皇曾孫坐衛太子事繫吉哀曾孫無辜擇謹門拒使者得全曾孫曾孫病吉數敕乳母加安獄中有天子氣上遣使令一切殺之吉閉自曾孫遭遇吉絕口不道前思至宫婢則自致醫藥視遇甚有恩惠以私財物給其衣食見問然後知吉有舊恩而終不言上大賢之陳嘗有阿保之功辭引使者丙吉知狀上親吉為博陽侯制詔丞相封蘇武之執節嵗始以彊壯出及武留匈奴凡十九拜爲典屬國還鬚髪盡白可謂難矣以諷操也言三臣者或問厲志曰若殷高宗能葺其德藥瞑眩以瘳疾而毒東齊海岱間或謂之暝或謂之眩瞑眩者令人憤悶之意方言云凡飲藥厥疾弗瘳若跣弗視地厥足用傷説命啓乃心沃朕心若藥弗瞑眩衞武箴戒於朝國曰自卿以下至于師長士苟在朝者武公和釐侯子年九十有五猶箴儆于我又作賔之初筵抑戒之詩以自警無謂我老耄而舍必恪恭于朝以交戒勾踐懸膽於坐坐卧即仰膽飲食亦嘗膽也曰女勾踐反國乃苦身焦思置膽於坐之恥耶忘㑹稽厲矣哉以再振漢業也言此欲獻帝勵志寵妻愛妾幸矣其為災也深矣災與幸同乎曰得則慶否則災戚氏不幸不人豕夫人也戚氏戚留守希見益䟽屢欲立戚夫人子如意為太髙帝愛幸戚夫人常從之關東吕后年長常鉗衣赭衣令舂未幾鴆殺趙王遂斷戚夫人子不果髙帝崩吕后乃令永巷囚戚夫人髠使居鞠域中名曰人彘手足去眼熏耳飲瘖藥趙昭儀不幸不失命顔師古曰昭顯其儀示隆重也趙昭儀者孝元帝始加昭儀之號位視丞相爵比諸侯王居昭陽舘顓寵十餘年成帝崩民間歸罪昭成皇后趙飛燕女弟也后寵衰而絶幸昭儀起居發病狀昭儀自殺儀皇太后詔治問皇帝栗姬不幸不廢立齊景帝妃栗姬妬而景帝諸美人皆因長公主見得栗姬男為太子長公主嫖有女欲與太子為長公主日譖栗姬景帝心銜之而未發也王貴幸栗姬日怨怒謝長主不許㑹薄皇后廢奏事文曰子以母貴母以子貴今太子母號夫人又隂使人趣六臣立栗姬為皇后大行為臨江王栗姬愈恚不得見以憂死冝為皇后帝怒遂案誅大行而廢太子鉤弋不幸不憂殤為倢伃居鉤弋宫大有寵元始鉤弋夫人姓趙氏昭帝母也進帝命其所生門曰堯母門後欲立鉤弋子為三年生昭帝號鉤弋子任身十四月乃生武猶豫久之鉤弋夫人從幸甘泉有過見譴以皇太子以其年穉母少恐女主顓恣亂國家葬雲陽憂死因非災而何謂否則災也按靈帝何貴言戚氏昭儀栗姬鉤弋所王美人任娠畏后乃服藥欲除之而胎安不人甚有寵幸性彊忌光和三年立為皇后時至董卓立獻帝乃遷何皇后於永安宫亦酖動後生皇子協即獻帝也何皇后酖殺美人顯言故申漢前事以為鑒戒弑之悦以美人獻帝母也不得若慎夫人之知坐袁盎引郤慎夫人夫人怒上亦怒盎曰孝文所幸慎夫人在禁中嘗與皇后同席人乃妾耳豈可同坐陛下獨不見人彘乎上臣聞尊卑有序則上下和今既已立后慎夫人賜盎金五十斤悦乃召語慎夫人夫班婕妤之賢自武帝始婕妤之號稱也班婕妤者彪之姑况之女也入後宫始位視上卿爵比列侯婕言接幸於上也妤美欲與婕妤同輦載辭止太后以樊姬擬之婕為少使俄而大幸為婕妤居増成舍成帝嘗后婕妤祝詛後宫詈及主上皇后坐廢婕妤妤每進見上䟽依則古禮至趙飛燕譛告許乃求共養太后長信宫以善對免因恐久見危明德皇后之德馬皇明德生肅宗帝命貴人養之撫育過於所生後有后伏波將軍援之少女為顯宗貴人時賈氏郎其人也遂立為皇后愈自謙肅能誦易好司奏立長秋宫皇太后曰馬貴人德冠後官裙不加縁每於侍執之際輒言及政事多所讀春秋楚詞尤喜周官董仲舒書常衣大練故寵敬日隆始終無衰毘補而未嘗以家私干邵矣哉夫人班婕妤邵髙也言慎德則慶也馬皇后所謂為世憂樂者君子之志也覆載之度公於四海不為世憂樂者小人之志也形骸之見私於一已太平之世事閑而民樂徧焉所樂君子使遽者揖讓百拜非禮也不可以成禮窘急者無敬故憂者弦歌鼓瑟非樂也不可以為樂愁慼者不和故禮者敬而已矣拜云乎揖讓百樂者和而已矣瑟云乎弦歌鼔匹夫匹婦處􅅵畝之中必禮樂存焉爾須不離敬和斯違上順道謂之忠臣違而得道者逆君從道所謂違道順上謂之䛕臣順而失義者逆道從君所謂忠所以為上也䛕所以自為也忠臣安於心䛕臣安於身故在上者必察乎違順順上順道謂違上違道審乎所為自為謂為上慎乎所安安身謂安心廣川王弗察故殺其臣師數諫正去去益大逐之内史請以為廣川惠王孫去初年十四五事師受易家去使奴殺師父子掾師數令内史禁切王楚恭王察之而遲故有遺言言及戰吕錡射恭王中目敗於鄢陵成公十六年楚子救鄭不聽申叔之少主社稷生十年而䘮先君未及習師保之至襄公十三年楚子疾告大夫曰不榖不徳辱社稷為大夫憂其弘多矣若以大夫之靈教訓而應受多福是以不徳而亡師于鄢以以從先君於禰廟者請為靈若厲大夫擇焉獲保首領以殁於地唯是春秋窀穸之事所遺言也此所謂齊宣王其察之矣故賞諫者文學遊宣王喜淵之徒七十六人皆命曰列大夫為開第康説之士自如騶衍淳于髠田駢接子慎到環寵之不洽而議論莊之衢髙門大屋尊或問人君人臣之戒曰莫匪戒也請問其要曰君戒專欲臣戒專利患之甚矣字缺五城重譯而獻珍非寶也腹心之人匍匐而獻善寶之至矣故明王慎内守除外寇而重内寶雲從于龍風從于虎曰龍吟則景雲出虎嘯則易曰雲從龍風從虎正義生谷風鳳儀于韶成鳳凰來書曰簫韶九麟集于孔十四哀公於土中央軒轅大角之獸春秋者禮也脩火年春西狩獲麟說左氏者云麟生於火而遊麟西方獸孔子立言西方故來劉向尹更始德以致其子故麟來而爲孔子瑞也陳欽云皆以爲文成致麟而杜氏悉無所取皆以爲應孔子而至賈逵服䖍潁容等應也出於此應於彼善則祥祥則福否則眚眚則咎故君子應之各從其􅀋言善否感應君子食和羮以平其氣聽和聲以平其志納和言以平其政履和行以平其德夫酸鹹甘苦不同嘉味以濟謂之和羮宮商角徴不同嘉音以章謂之和聲臧否損益不同中正以訓謂之和言趨舍動静不同雅度以平謂之和行人之言曰唯其言而莫予違也則幾於喪國焉孔子曰君子和而不同語文俱論晏干亦云以水濟水誰能食之琴瑟一聲誰能聽之可君所謂否據亦曰否若以水濟水誰能食晏子謂齊侯曰今據不然君所謂可據亦曰是周太史伯告鄭桓公曰聲一無聽物一無之若琴瑟之專壹誰能聽之同之不可也如物一不講文味一無果詩云亦有和羮既戒且平奏假無言時靡有爭此之謂也所引按後漢劉曼詩殷頌文亦晏子媚可知矣至獻帝時尤甚故悦以為言山著辨和同之論則當時在位之闇偽阿申鑒巻第四
