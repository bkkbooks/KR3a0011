  hash: sha256:084b42f6e95e4e6545e236975ade8e205383fefe1021c9d793f758c21f9377dc
body:
  text: 漢荀悦撰時事第二最凡有二十一首其初二首尚知貴敦也其二首有申重可舉者十有九事一曰明考試二曰公卿不拘為郡二千石不拘為縣三曰置上武之官四曰議州牧五曰生刑而死者但加肉刑六曰徳刑並用七曰避讎有科八曰議禄九曰議專地十曰議錢貨十一曰約祀舉重十二曰天人之應十三曰月正聴朝十四曰崇内教十五曰備博士十六曰至德要道十七曰禁數赦令十八曰正尚主之制十九曰復外内注記者盤庚遷殷革奢即約盤庚殷王名自契至湯八遷始居亳自湯至盤庚五遷乃渉河南復湯故居行湯之政以具貝玉總貨寶為戒乃革奢即約之類化而裁之與時消息衆寡盈虗不常厥道尚知貴敦古今之法也民寡則用易足土廣則物易生事簡則業易定厭亂則思治創難則思静殷自中丁以來廢適而更立諸弟子或爭相代立比九世亂諸侯莫朝或曰三皇民至敦也其治至清也天性乎曰皇民敦秦民弊時也皇秦之時不同故敦弊不同山民樸市民玩處也山市之處不同故樸玩不同桀紂不易民而亂湯武不易民而治政也桀紂湯武之政不同故治亂不同皇民寡寡斯敦三皇之時烝庶鮮少機智不生所以至敦皇治純純斯清三皇之治無為而化繁苛不尚所以至清奚惟性不求無益之物不蓄難得之貨節華麗之飾退利進之路則民俗清矣簡小忌去淫祀絶竒怪則妖偽息矣致精誠求諸已正大事則神明應矣放邪説去淫智抑百家諸子殽亂之言崇聖典則道義定矣去浮華舉功實絶末伎同本務則事業脩矣能盡五事則民敦治清矣此初二首所謂尚知貴敦也誰毁誰譽譽其有試者萬事之概量也孔子曰吾之於人也誰毁誰譽如有所譽者其有所試矣概所以戛摩取平者斗斛曰量言考試品賢能之虚實猶概量較米粟之多寡也以兹舉者試其事處斯職者考其績詢事驗舉省績察職賞罰夫實以惡反之人焉飾哉語曰盗跖不能盗田尺寸寸不可盗况尺乎纎惡細善不可閟掩夫事驗必若土田之張於野也則為私者寡矣田布於野不可隱者喻惡不可掩也若亂之墜於澳也則可信者觧矣亂朱子曰舟之截流横渡者澳厓内近水之處舟登於陸不可信者喻善不可偽也故有事考功有言考用動則考行靜則考守此一首所謂明考試也公卿不為郡二千石不為縣未是也公謂三公師傅保也卿謂六卿冡宰至司空也郡謂郡守郡尉縣謂縣令縣長也班固曰郡守秦官掌治其郡秩二千石郡尉秦官掌佐守典武職甲卒秩比二千石縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石减萬戸為長秩五百石至三百石小能其職以極登於大故下俗本誤作不位競小職有登則下位競修其業矣大橈其任以墜於下故上位慎大任有墜則上位慎共其職矣其鼎覆刑焉何憚於降易鼎九四曰鼎折足覆公餗其形渥凶此言大臣廢壞國事刑之尚可何况降位若夫千里之任不能充於郡而縣邑之功廢惜矣哉不以過職絀則勿降所以優賢也以過職絀則降所以懲愆也此一首所謂公卿不拘為郡二千石不拘為縣也孝武皇帝以四夷未賔冦賊姦宄初置武功賞官以寵戰士大司農陳臧錢經用賦税既竭不足以奉戰士有司請令民得買爵及贖禁錮免贓罪請置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫其有罪又减二等爵得至樂卿以顯軍功按茂陵中書有武功爵一級曰造士二級曰閑輿衞三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戍十級曰政戾庶長十一級曰軍衛此武帝所制以寵軍功若今依此科而崇其制置尚武之官以司馬兵法選位秩比博士齊將司馬穰苴撰兵法三卷秩比博士六百石也講司馬之典簡蒐狩之事古者中春教振旅遂以蒐田中夏教苃舍遂以苗田中秋教治兵遂以獮田中冬教大閲遂以狩田詳見周禮掌軍功爵賞小統於五校校俗本誤作枚五校者一曰屯騎二曰越騎三曰步兵四曰長水五曰射聲俱掌宿衞兵所謂大駕鹵簿五校在前是也大統於太尉太尉秦官金印紫綬掌武事武帝建元二年省元狩四年初置大司馬以冠將軍之號建武二十七年復為太尉既周時務禮亦宜之周之末葉兵革繁矣莫亂於秦民不荒殄今國家忘戰日久毎冦難之作民瘁幾盡不教民戰是謂棄之信矣孔子曰以不教民戰是謂棄之古者四時于田所以教爾此一首所謂置尚武之官也或問曰州牧刺史監察御史三制孰優監御史秦官掌監郡漢興省之至惠帝三年又遣御史監三輔郡所察之事凡九條監者二嵗更之其後諸州復置監察御史文帝十三年以御史不奉法下失其職乃遣丞相史出刺并督察監御史武帝元封元年御史止不復監至五年乃置部刺史掌奉詔六條察州凡十二州焉居部九嵗舉為守相成帝綏和元年以為刺史位下大夫而臨二千石輕重不相凖乃更為州牧秩真二千石位次九卿建平二年復為刺史元壽二年復為牧建武十八年復為刺史十二人各主一外州舊以八月廵行所部録囚徒考殿最初嵗盡詣京師奏事中興但因計吏不復自詣京師雖父母之䘮不得去職或謂州府為外臺靈帝中平五年改刺史惟置牧是時天下方亂多自九卿出領州牧州牧之任自此重矣曰時制而已三制隨時所定曰天下不既定其牧乎曰古諸侯建家國世位權柄存焉於是置諸侯之賢者以牧總其紀綱而已不統其政不御其民今郡縣無常不若古諸侯之世位權輕不固不若古諸侯之權柄存而州牧秉其權重勢異於古不若古諸侯之牧不統政御民非所以强幹弱枝也而無益治民之實監察御史斯可也言監御史愈於州牧若權時之宜則異論也此一首所謂議州牧也肉刑古也或曰復之乎曰古者人民盛焉今也至寡整衆以威撫寡以寛道也復刑非務必也生刑而極死者復之可也如斬右趾本生刑也而改為棄市則極死矣斯則斬右趾之刑復之可也自古肉刑之除也斬右趾者死也惟復肉刑是謂生死而息民孝文下令除肉刑張蒼等立律曰諸當完者完為城旦舂當黥者髠鉗為城旦舂當劓者笞二百當斬左趾者笞五百當斬右趾及殺人先自告及吏受賕枉法守縣官財物而即盗之已論命復有笞罪者皆棄市是後外有輕刑之名内實殺人斬右趾者又當死笞五百三百率多死至景帝更定箠令此言肉刑極死者復之則死者生而民生息矣此一首所謂生刑而死者但加肉刑也問德刑並用常典也或先或後時宜或先徳後刑或先刑後徳隨時所宜刑教不行勢極也常典不行過伉耳教初必簡刑始必略事漸也創始欲民易從宜於簡略教化之隆莫不興行然後責備簡者以漸而備刑法之定莫不避罪然後求密略者以漸而密未可以備謂之虚教教化未隆民不興行而責備焉是謂虚教也未可以密謂之峻刑刑法未定民不避罪而求密焉是謂峻刑也虛教傷化峻刑害民君子弗由也設必違之教不量民力之未能是招民於惡也故謂之傷化未可以備而責備則教必違設必犯之法不度民情之不堪是陷民於罪也故謂之害民未可以密而求密則法必犯莫不興行則一毫之善可得而勸也然後教備民行脩飭則教備而不違莫不避罪則纎介之惡可得而禁也然後刑密民知畏罪則法密而不犯此一首所謂徳刑並用也或問復讎古義也曰縱復讎可乎曰不可縱之則人將倚法專殺亂滋生矣曰然則如之何曰有縱有禁有生有殺弗避而報者無罪所謂有縱有生避而報之殺所謂有禁有殺制之以義據禮經則義不同天斷之以法徵法令則殺人者死是謂義法並立曰何謂也曰依古復讎之科使父讎避諸異州千里兄弟之讎避諸異郡五百里從父從兄弟之讎避諸異縣百里周禮調人凡和難父之讐辟諸海外兄弟之讐辟諸千里之外從父兄弟之讐不同國君之讐眡父師長之讐眡兄弟主友之讐眡從父兄弟弗辟則與之瑞節而以執之凡殺人有反殺者使邦國交讐之凡殺人而義者不同國令勿讐讐之則死此古復讐之科也又禮記曰父之讐弗與共戴天兄弟之讐不反兵交逰之讐不同國又子夏問於孔子曰居父母之讐如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬬曰請問居昆弟之讐如之何曰仕弗與共國銜君命而使雖遇之不鬬曰請問居從父昆弟之讐如之何曰不為魁主人能則執兵而陪其後按此異州乃九州之州弗避而報者無罪未辟之前但知有復讐之義而已故報者生之避而報之殺既辟之後則有王禁在焉故報者誅之犯王禁者罪也復讎者義也以義報罪從王制順也犯制逆也以逆順生殺之凡以公命行止者不為弗避此一首所謂辟讐有科也或問禄曰古之禄也備其詳見周禮孟子王制漢之禄也輕漢制禄秩自中二千石至百石各有等差夫禄必稱位一物不稱非制也公生貶則私利生言月俸貶損則賄賂行矣私利禄則亷者匱而貪者豐也潔白者窶貧汙墨者富羡夫豐貪生私匱亷貶公是亂也先王重之曰禄可増乎曰民家財愆増之宜矣或曰今禄如何今謂獻帝時曰時匱也禄依食食依民叅相澹澹古贍字給也即漢書猶未足以澹其欲及以澹不足之澹此言民以給食食以給禄所謂叅相贍也必也正貪禄黜汙吏省閑冗汰羡官與時消息昭惠恤下損益以度可也此一首所謂議禄也諸侯不專封富人名田踰限富過公侯是自封也大夫不專地人賣買由已是專地也董仲舒説武帝曰秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地又顓川澤之地管山林之饒荒􅁋越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困古井田法雖難卒行宜少近古限民名田以澹不足至哀帝時師丹建言累世承平豪富吏民訾數鉅萬而貧弱愈困宜畧為限丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及闗内侯吏民名田皆毋過三十頃時丁傅用事董賢隆貴皆不便也後遂寢不行或曰復井田與曰否專地非古也井田非今也言專地固非隆古之典而井田廢久又非今所可行然則如之何曰耕而勿有以俟制度可也耕而勿有不得賣買由已以俟制度不得踰限也此一首所謂議專地也或問貨曰五銖之制宜矣太公為周立九府圜法錢圜函方輕重以銖至漢孝武元狩五年初鑄五銖錢至平帝元始中成錢二百八十億萬餘王莾居攝變漢制於是更造大錢重十二銖又曰大錢五十又造契刀錯刀與五銖凡四品並行莾即真乃罷契刀錯刀及五銖更造錢貨六品而民便五銖私相市買莾下詔敢非井田挾五銖錢者為惑衆投諸四裔以御魑魅於是農商失業食貨俱廢世祖受命復五銖錢與天下更始觀此則五銖之制宜便於民者久矣曰今廢如之何今謂獻帝時廢者初平元年董卓壞五銖錢更鑄小錢是也曰海内既平行之而已言卓既誅此制宜復曰錢散矣京畿一作甸虚矣其勢必積於逺方若果行之則彼以無用之錢市吾有用之物是匱近而豐逺也曰散曰虗曰積曰無用之錢皆言五銖彼謂逺方也曰事勢有不得官之所急者穀也牛馬之禁不得出百里之外若其他物彼以其錢取之於左用之於右貿遷有無周而通之海内一家何患焉言五穀不得及逺他物以五銖貿遷不足以匱近為患也曰錢寡矣曰錢寡民易矣若錢既通而不周於用然後官鑄而補之言五銖由廢故易由易故寡不足官鑄以贍可也或曰收民之藏錢者輸之官牧逺輸之京師然後行之曰事枉而難實者欺慢必衆奸偽必作争訟必繁刑殺必深吁嗟紛擾之聲章乎天下矣非所以撫遺民成緝熈也此言逺收五銖於京師而後行之騷動不可曰然則收而積之與曰通市其可也此言收五銖積貯亦不可或曰改鑄四銖曰難矣此言改鑄四銖以復孝文之舊亦不可或曰遂廢之曰錢實便於事用民樂行之禁之難今開難令以絶便事禁民所樂不茂矣此言廢五銖以絶民所便禁民所樂亦不可曰起而行之錢不可如之何曰尚之廢之弗得已何憂焉言或尚或廢其勢自有所不得已者蓋民便五銖不得而終廢之不憂其不行也厥後曹操為相還用五銖悅之言驗矣此一首所謂議錢貨也聖王先成民而後致力於神東觀書詔傳曰聖王先成民而後致力於神民事未定謂有日月水旱癘疫之災郡祀有闕不為尤矣必也舉其重而祀之望祀五嶽四瀆其神之祀縣有舊常五嶽岱衡華恒嵩也四瀆江河淮濟也按漢制岱宗廟在博縣西北三十里山虞長守之十月日合凍臘月日涸凍正月日解凍皆太守自侍祠法七十萬五千三牲燔柴上福脯三十朐縣次傳送京師衡廟在廬江􅈞縣華廟在𢎞農華隂縣恒廟在中山上曲陽縣嵩廟在潁川陽城縣皆同禮河廟在河南滎陽縣河隄謁者掌四瀆禮祠與五嶽同江廟在廣陵江都縣淮廟在平氏縣濟廟在東郡臨邑縣所謂其神之祀縣有舊常也若今郡祀之而其祀禮物從鮮可也言嶽瀆之祀雖曰縣有常典但民事未定望祀可也若必郡祀則禮物宜從省畧禮重本示民不偷且昭典物其備物以豐年日月之災降異非舊也此一首所謂約祀舉重也天人之應所由來漸矣故履霜堅氷非一時也坤初六曰履霜堅氷至仲尼之禱非一朝也且日食行事或稠或曠一年二交非其常也洪範傳云六沴作見若是王都未見之無聞焉爾官脩其方而先王之禮保章視祲安宅叙降必書雲物為備故也周禮保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事又眡祲掌十煇之法以觀妖祥辨吉凶一曰祲二曰象三曰鑴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降鄭氏曰宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之太史上事無隱焉勿寢可也百官志太史令掌天時星厯凡嵗將終奏新年厯凡國祭祀䘮娶掌奏良日及時節禁忌凡國有瑞應災異掌記之靈臺丞掌守靈臺候日月星氣屬太史漢官曰靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舍人此一首所謂天人之應也天子南靣聴天下嚮明而治蓋取諸離易繫辭離也者明也萬物皆相見南方之卦也聖人南面而聴天下嚮明而治蓋取諸此也天之道也月正聴朝國家之大事也禮儀志每月朔嵗首為大朝受賀其儀夜漏未盡七刻鍾鳴受賀及䞇公侯璧中二千石二千石羔千石六百石鴈四百石以下雉百官賀正月二千石以上上殿稱萬嵗舉觴御坐前司空奉羮大司農奉飯奏食舉樂百官受賜宴享大作樂其每朔惟十月旦從故事者髙祖定秦之月元年嵗首也宜正其儀以明舊典漢舊儀公卿以下每月常朝後以頻省唯六月十月朔後復以六月盛暑省之其儀不舉久矣此一首所謂月正聴朝也古有掌隂陽之禮之官以教後宫周禮内宰以隂禮教六宫以隂禮教九嬪以婦職之法教九御掌婦學之法婦徳婦言按此當有婦容二字婦功周禮九嬪掌婦學之法以教九御婦徳婦言婦容婦功各帥其屬而以時御叙于王所鄭氏曰婦徳謂貞順婦言謂辭令婦容謂婉娩婦功謂絲枲也各率其屬而以時御序于王先王禮也宜崇其教以先内政覽列圖誦列傳遵典行内史執其彤管記善書過考行黜陟以章好惡男女正位乎内外正家而天下定矣易家人曰女正位乎内男正位乎外男女正天地之大義也又曰正家而天下定矣故二儀立而大業成君子之道匪闕終日造次必於是此一首所謂崇内教也備博士博士秦官掌通古今武帝建元初置五經博士黄龍初稍増員十二人後漢百官志博士祭酒一人博士十四人掌易四施孟梁丘京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顔氏掌教弟子國有疑事掌承問對廣太學辟雍也而祀孔子焉禮也仲尼作經本一而已古今文不同而皆自謂真本經各謂真傳古今先師義一而已異家别説不同而皆自謂古今此處有誤仲尼邈而靡質大聖已逝經無所質昔先師殁而無間老師已䘮義無所間將誰使折之者秦之滅學也書藏於屋壁義絶於朝野孔安國書序秦始皇滅先代典籍焚書坑儒天下學士逃難解散我先人用藏其家書于屋壁逮至漢興收摭散滯固已無全學矣藝文志漢興大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩文有磨滅言有楚夏出有先後如文帝時伏生口誦尚書以授晁錯僅得二十九篇至魯恭王壞孔子宅得所藏科斗文字定其可知者増多伏生二十五篇此出有先後之類也或學者先意有所借定無所徵據臆見損益後進相放彌以滋蔓故一源十流天水違行而訟者紛如也易訟曰天與水違行此以天上水下相違而行喻學者所傳背戾互相爭是也執不俱是比而論之必有可參者焉此一首所謂備博士也或曰至德要道約爾典籍甚富如而博之以求約也語有之曰有鳥將來張羅待之得鳥者一目也今為一目之羅無時得鳥矣鳥喻道羅喻典籍道雖要也非博無以通矣孟子曰博學而詳説之將以反説約也博其方約其説此一首所謂至徳要道也赦令權也謂凶荒流離盗賊垢汙之後不得已而行者或曰有制乎曰權無制制其義不制其事巽以行權易繫辭文義制也權者反經無事也問其象曰無妄之災大過凶其象矣不得已而行之禁其屢也初平元年春正月山東州郡起兵以討董卓辛亥大赦天下二年春正月辛丑大赦天下三年春正月丁丑大赦天下五月丁酉大赦天下卓誅部將李傕等六月陷長安己未大赦天下四年春丁卯大赦天下興平元年春正月辛酉大赦天下二年春正月癸丑大赦天下建安元年春正月癸酉郊祀上帝於安邑大赦天下丁丑郊祀上帝大赦天下初平至此凡七年而大赦者十可謂數甚故悅以此規之曰絶之乎曰權曰宜弗之絶也既曰權宜著非常典此一首所謂禁數赦令也尚主之制非古也釐降二女陶唐之典堯典曰釐降二女於媯汭嬪於虞歸妹元吉帝乙之訓易泰九五曰帝乙歸妹以祉元吉王姬歸齊宗周之禮詩序曰雖則王姬亦下嫁于諸侯以隂乘陽違天以婦凌夫違人違天不祥違人不義悅之叔父荀爽於延熹九年對䇿陳便宜以漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義宜改尚主之制今悦復以為言殆其家門素所商講者乎此一首所謂正尚主之制也古者天子諸侯有事必告于廟朝有二史左史記言右史記動按漢書作事字玉藻曰卒食𤣥端而居動則左史書之言則右史書之動為春秋春秋記事言為尚書尚書記言君舉必記臧否按漢書作善惡成敗無不存焉下及士庶等各有異按漢書作苟有茂異咸在載籍或欲顯而不得或欲隱而名章紀以至公得失一朝而榮辱千載善人勸焉淫人懼焉故先王重之以嗣賞罰以輔法教宜於令者官以其日各書其盡則集之於尚書按漢書作宜於令者備置史官掌其典文紀其行事毎於嵗盡舉之尚書則此上下必有脱誤若史官使掌典其事不書詭常為善惡則書言行足以為法式則書立功事則書兵戎動衆則書四夷朝獻則書皇后貴人太子拜立則書光武置貴人為三夫人公主大臣拜免則書福淫禍亂則書祥瑞災異則書先帝故事有起居注漢時有禁中起居故明徳馬皇后自撰顯宗起居注日用動靜之節必書焉宜復其式内史掌之以紀内事此一首所謂復内外注記者也申鑒卷二欽定四庫全書申鑒卷三漢荀悦撰俗嫌第三或問卜筮曰徳斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損吉凶謂兆數之所值言修徳則足以協吉而消凶否則反是或問曰時羣忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈漢時俗有方忌如西益宅謂之不祥必有死亡商家門不宜南向徵家門不宜北向之類是也故甲子昩爽殷滅周興武成曰甲子昩爽受率其旅若林㑹于牧野罔有敵於我師前徒倒戈攻於後以北血流漂杵一戎衣天下大定所謂殷以甲子滅周以甲子興也言支干不足忌矣咸陽之地秦亡漢隆秦都關中二世而亡漢遷長安歴年四百言相地家不足信矣或問五三之位周應也五三五星三辰辰星熒惑太白嵗星填星日月斗也志所謂周師初發嵗在鶉火日在析木月在天駟辰在斗柄星在天黿是也春秋元命苞曰殷紂之時五星聚於房房者蒼神之精周據而興龍虎虎當作尾之㑹晉祥也晉獻公問於卜偃曰攻虢何月也曰童謡有之曰丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔火中而旦其九月十月之交乎韋氏解曰丙丙子晨蚤朝也龍尾尾星也伏隱也辰日月之交㑹也魯僖五年東周十二月夏十月丙子朔之朝日在尾月在天䇿也伏辰辰在龍尾隱而未見也鶉鶉火鳥星也賁賁鶉火星貌也天䇿尾上一星名曰天䇿一名傳說焞焞近日月之貌也火鶉火也中晨中也成軍軍有成功也傳曰冬十二月丙子朔晉滅虢虢公醜奔京師曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也布衣無位者貞良無罪者言布衣而寓官府則爵不符貞良而入獄犴則罰不受以喻周應晉祥惟武王獻公能當之也或曰然則日月可廢歟曰否曰元辰先王所用也辰謂日月所㑹自𤣥枵至星紀是也周禮馮相氏掌十有二嵗十有二月十有二辰人承天地故動静焉順順其隂陽順其日辰順其度數内有順實外有順文文實順理也休徴之符自然應也故盜泉朝歌孔墨不由尸子曰孔子過於盗泉渴矣而不飲惡其名也劉向曰邑號朝歌墨子回車惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也祈請求禱也如祈年祈子孫請雨請福之類周禮太祝掌六祈以同鬼神􅅘故精以底之犠牲玉帛以昭祈請吉朔以通之禮云禮云玉帛云乎哉請云祈云酒膳云乎哉非其禮則或愆非其請則不應或問祈請可否曰氣物應感則可性命自然則否應感如土龍致雨之類或問避疾厄有諸曰夫疾厄何為者也非身則神身不可避身寓宇宙避將焉之神不可逃神寓形骸逃將焉之可避非身可逃非神也持身隨天萬里不逸譬諸孺子掩目巨夫之掖而曰逃可乎
