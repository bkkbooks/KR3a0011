  - {type: variant, offset: 2571, length: 0, content: '', SBCK: 内外注記者也此一首所謂復申鑒卷第二}
  - {type: variant, offset: 2571, length: 0, content: '', WYG: 此一首所謂復内外注記者也申鑒卷二欽定四庫全書申鑒卷三漢荀悦撰俗嫌第三或問卜筮曰徳斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損吉凶謂兆數之所值言修徳則足以協吉而消凶否則反是或問曰時羣忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈漢時俗有方忌如西益宅謂之不祥必有死亡商家門不宜南向徵家門不宜北向之類是也故甲子昩爽殷滅周興武成曰甲子昩爽受率其旅若林㑹于牧野罔有敵於我師前徒倒戈攻於後以北血流漂杵一戎衣天下大定所謂殷以甲子滅周以甲子興也言支干不足忌矣咸陽之地秦亡漢隆秦都關中二世而亡漢遷長安歴年四百言相地家不足信矣或問五三之位周應也五三五星三辰辰星熒惑太白嵗星填星日月斗也志所謂周師初發嵗在鶉火日在析木月在天駟辰在斗柄星在天黿是也春秋元命苞曰殷紂之時五星聚於房房者蒼神之精周據而興龍虎虎當作尾之㑹晉祥也晉獻公問於卜偃曰攻虢何月也曰童謡有之曰丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔火中而旦其九月十月之交乎韋氏解曰丙丙子晨蚤朝也龍尾尾星也伏隱也辰日月之交㑹也魯僖五年東周十二月夏十月丙子朔之朝日在尾月在天䇿也伏辰辰在龍尾隱而未見也鶉鶉火鳥星也賁賁鶉火星貌也天䇿尾上一星名曰天䇿一名傳說焞焞近日月之貌也火鶉火也中晨中也成軍軍有成功也傳曰冬十二月丙子朔晉滅虢虢公醜奔京師曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也布衣無位者貞良無罪者言布衣而寓官府則爵不符貞良而入獄犴則罰不受以喻周應晉祥惟武王獻公能當之也或曰然則日月可廢歟曰否曰元辰先王所用也辰謂日月所㑹自𤣥枵至星紀是也周禮馮相氏掌十有二嵗十有二月十有二辰人承天地故動静焉順順其隂陽順其日辰順其度數内有順實外有順文文實順理也休徴之符自然應也故盜泉朝歌孔墨不由尸子曰孔子過於盗泉渴矣而不飲惡其名也劉向曰邑號朝歌墨子回車惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也祈請求禱也如祈年祈子孫請雨請福之類周禮太祝掌六祈以同鬼神􅅘故精以底之犠牲玉帛以昭祈請吉朔以通之禮云禮云玉帛云乎哉請云祈云酒膳云乎哉非其禮則或愆非其請則不應或問祈請可否曰氣物應感則可性命自然則否應感如土龍致雨之類或問避疾厄有諸曰夫疾厄何為者也非身則神身不可避身寓宇宙避將焉之神不可逃神寓形骸逃將焉之可避非身可逃非神也持身隨天萬里不逸譬諸孺子掩目巨夫之掖而曰逃可乎}
