  - {type: variant, offset: 893, length: 0, content: '', SBCK: 文孝城旦春當黥者髠鉗爲城旦春當劓者笞三下令除肉刑張蒼等立律曰諸當完者完爲自告及吏受賕枉法守縣官財物而卽盜之百當斬左止者笞五百當斬右止及殺人先之名內實殺人斬右止者又當死笞五百三已論命復有笞罪者皆棄市是後外有輕刑者復之則死者生而民生息矣此一首所謂百率多死至景帝更定箠令此言肉刑極死但加肉刑也生刑而死者}
  - {type: variant, offset: 893, length: 0, content: '', WYG: 孝文下令除肉刑張蒼等立律曰諸當完者完為城旦舂當黥者髠鉗為城旦舂當劓者笞二百當斬左趾者笞五百當斬右趾及殺人先自告及吏受賕枉法守縣官財物而即盗之已論命復有笞罪者皆棄市是後外有輕刑之名内實殺人斬右趾者又當死笞五百三百率多死至景帝更定箠令此言肉刑極死者復之則死者生而民生息矣此一首所謂生刑而死者但加肉刑也}
