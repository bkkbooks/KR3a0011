  - {type: variant, offset: 1149, length: 0, content: '', krp: 人凡和周禮調外從父兄弟之讎不同國君之讎眡父師長難父之讎辟諸海外兄弟之讎辟諸千里之與之瑞節而以執之凡殺人有反殺者使邦之讎眡兄弟主友之讎眡從父兄弟弗辟則之則死此古復讎之科也又禮記曰父之讎國交讎之凡殺人而義者不同國令勿讎讎同國又子夏問於孔子曰居父母之讎如之弗與共載天兄弟之讎不反兵交遊之讎不諸市朝不反兵而鬬曰請問居昆弟之讎如何夫子曰寢苦枕干不仕弗與共天下也遇鬬曰請問居從父昆弟之讎如之何曰不為之何曰仕弗與共國銜君命而使雖遇之不後按此異州乃九州之州魁主人能則執兵而陪其}
