  - {type: variant, offset: 1846, length: 0, content: '', SBCK: 星辰日月之變動以觀天周禮保章氏掌天星以志封域皆有分星以觀妖祥以十有二歲之相下之遷辨其吉凶以星土辨九州之地所封豐荒之祲象以十有一風察天地之和命乖觀天下之妖祥以五雲之物辨吉凶水旱降眡祲掌十煇之法以觀妖祥辨吉凶一曰祲别之妖祥凡此五物者以詔救政訪序事又彌八曰叙九曰隮十曰想掌安宅叙降鄭氏二曰象三曰鑴四曰監五曰闇六曰瞢七曰其居處也次序其凶禍所下謂禳移之曰宅居也降下也人見妖祥則不安主安}
  - {type: page-break, offset: 1846, content: '', id: KR3a0011_SBCK_002-12a}
  - {type: variant, offset: 1846, length: 0, content: '', WYG: 周禮保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事又眡祲掌十煇之法以觀妖祥辨吉凶一曰祲二曰象三曰鑴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降鄭氏曰宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之}
  - {type: variant, offset: 1846, length: 0, content: '', krp: 星辰日月之變動以觀天周禮保章氏掌天星以志封域皆有分星以觀妖祥以十有二歲之相下之遷辨其吉凶以星土辨九州之地所封豐荒之祲象以十有一風察天地之和命乖觀天下之妖祥以五雲之物辨吉凶水旱降眡祲掌十煇之法以觀妖祥辨吉凶一曰祲别之妖祥凡此五物者以詔救政訪序事又彌八曰叙九曰隮十曰想掌安宅叙降鄭氏二曰象三曰鑴四曰監五曰闇六曰瞢七曰其居處也次序其凶禍所下謂禳移之曰宅居也降下也人見妖祥則不安主安}
