  - {type: variant, offset: 721, length: 0, content: '', SBCK: 史秦監御監三輔郡所察之事凡九條監者二嵗更之官掌監郡漢興省之至惠帝三年又遣御史史不奉法下失其職乃遣丞相史出刺并督其後諸州復置監察御史文帝十三年以御五年乃置部刺史掌奉詔六條察州凡十二察監御史武帝元封元年御史止不復監至為刺史位下大夫而臨二千石輕重不相凖州焉居部九嵗舉為守相成帝綏和元年以年復為刺史元壽二年復為牧建武十八年乃更為州牧秩真二千石位次九卿建平二行所部録囚徒考殿最初嵗盡詣京師奏事復為刺史十二人各主一外州舊以八月廵不得去職或謂州府為外臺靈帝中平五年中興但因計吏不復自詣京師雖父母之䘮九卿出領州牧州牧之任自此重矣改刺史惟置牧是時天下方亂多自}
  - {type: page-break, offset: 721, content: '', id: KR3a0011_SBCK_002-5a}
  - {type: variant, offset: 721, length: 0, content: '', WYG: 監御史秦官掌監郡漢興省之至惠帝三年又遣御史監三輔郡所察之事凡九條監者二嵗更之其後諸州復置監察御史文帝十三年以御史不奉法下失其職乃遣丞相史出刺并督察監御史武帝元封元年御史止不復監至五年乃置部刺史掌奉詔六條察州凡十二州焉居部九嵗舉為守相成帝綏和元年以為刺史位下大夫而臨二千石輕重不相凖乃更為州牧秩真二千石位次九卿建平二年復為刺史元壽二年復為牧建武十八年復為刺史十二人各主一外州舊以八月廵行所部録囚徒考殿最初嵗盡詣京師奏事中興但因計吏不復自詣京師雖父母之䘮不得去職或謂州府為外臺靈帝中平五年改刺史惟置牧是時天下方亂多自九卿出領州牧州牧之任自此重矣}
