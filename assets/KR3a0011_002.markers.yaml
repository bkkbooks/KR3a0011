  - {type: variant, offset: 1857, length: 0, content: '', SBCK: 天時星曆凡嵗將百官志太史令掌節禁忌凡國有瑞應災異掌記之靈臺丞掌終奏新年曆凡國祭祀䘮娶掌奏良日及時詔四十二人其十四人候星二人􅀱日三人守靈臺候日月星氣屬太史漢官曰靈臺待律一人舍人此一首所謂天人之應也候風十二人􅀱氣三人候晷景七人候鍾}
  - {type: variant, offset: 1857, length: 0, content: '', WYG: 百官志太史令掌天時星厯凡嵗將終奏新年厯凡國祭祀䘮娶掌奏良日及時節禁忌凡國有瑞應災異掌記之靈臺丞掌守靈臺候日月星氣屬太史漢官曰靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舍人此一首所謂天人之應也}
