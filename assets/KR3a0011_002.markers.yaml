  - {type: variant, offset: 1351, length: 0, content: '', SBCK: 仲董井田民得賣買富者田連仟伯貧者亡立錐舒説武帝曰秦用商鞅之法改帝王之制除踰侈以相髙邑有人君之尊里有公侯之富之地又顓川澤之地管山林之饒荒淫越制古限民各田以澹不足至哀帝時師丹建言小民安得不困古井田法雖難卒行冝少近冝略爲限丞相孔光大司空何武奏請諸侯累世承平豪富吏民訾數鉅萬而貧弱愈囷田縣道及關内侯吏民名田皆母過三十頃王列侯皆得名田國中列侯在長安公主名皆不便也後遂寢不行時丁傅用事董賢隆貴}
  - {type: page-break, offset: 1351, content: '', id: KR3a0011_SBCK_002-9a}
  - {type: variant, offset: 1351, length: 0, content: '', WYG: 董仲舒説武帝曰秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地又顓川澤之地管山林之饒荒􅁋越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困古井田法雖難卒行宜少近古限民名田以澹不足至哀帝時師丹建言累世承平豪富吏民訾數鉅萬而貧弱愈困宜畧為限丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及闗内侯吏民名田皆毋過三十頃時丁傅用事董賢隆貴皆不便也後遂寢不行}
