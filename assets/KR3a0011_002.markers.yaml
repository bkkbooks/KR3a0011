  - {type: variant, offset: 1395, length: 0, content: '', SBCK: 圜法錢圜函方輕太公爲周立九府平帝元始中成錢二百八十億萬餘王莽居重以銖至漢孝武元狩五年初鑄五銖錢至錢五十又造契刀錯刀與五銖凡四品並行攝變漢制於是更造大錢重十一銖又曰大品而民便五銖私相市買莽下詔敢非井田莽即真乃罷契刀錯刀及五銖更造錢貨六是農商失業食貨俱廢世祖受命復五銖錢挾五銖錢者為惑衆投諸四裔以御魑魅於銖之制冝便於民久矣與天下更始觀此則五}
