  - {type: variant, offset: 474, length: 0, content: '', SBCK: 時如董卓鳴鐘鼓如洛以逐君側之惡為此偽私放奢所以為患而當先屏也按當天下偽莫有甚焉者卓以嚴刑脅衆睚眦之名而實有異志後則劫帝長安欲事成雄據誣寃死私莫有甚焉者卓至西京乘青蓋金隙必報故當時法令苛刻愛憎淫刑更相被與長安城埒積穀為三十年儲珠玉錦綺奇華車􅀲畫兩轓放莫有甚焉者卓築郿塢髙汜擅政曹操柄國率田一軌海内成風故悦玩雜物皆山崇阜積奢莫有甚焉者繼而傕言以為}
