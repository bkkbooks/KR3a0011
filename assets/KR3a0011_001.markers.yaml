  - {type: variant, offset: 1539, length: 0, content: '', SBCK: 禮周訟壹刺曰訊羣臣再刺曰訊羣吏三刺曰訊司刺掌三刺三宥三赦之法以賛司寇聽獄壹赦曰幼弱再赦曰老耄三赦曰憃愚以此萬民壹宥曰不識再宥曰過失三宥曰遺忘之罪然後刑殺所謂情訊以寛之也三法者求民情斷民中而施上服下服}
