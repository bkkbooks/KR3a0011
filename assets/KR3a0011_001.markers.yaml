  - {type: variant, offset: 1534, length: 0, content: '', SBCK: 法左九棘􅀌􅀸大夫位焉周禮朝士掌建􅀖外朝之在其後面三槐三公位焉州長衆庶在其後羣士在其後右九棘公侯伯子男位焉羣吏曰成獄辭史以獄成告寸正正聽之正以獄左嘉石平罷民焉右肺石達窮民焉又王制寇以獄之成告於王王命三公參聽之三公成告于大司寇大司寇聽之棘木之下大司後制刑所謂棘槐以斷之也以獄之成告于王王三宥然}
  - {type: variant, offset: 1534, length: 0, content: '', WYG: 周禮朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉又王制曰成獄辭史以獄成告于正正聴之正以獄成告于大司冦大司冦聴之棘木之下大司冦以獄之成告于王王命三公參聴之三公以獄之成告于王王三宥然後制刑所謂棘槐以斷之也}
