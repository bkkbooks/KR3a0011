  - {type: variant, offset: 1529, length: 0, content: '', SBCK: 士各職聽于朝司寇聽周禮鄉士遂士縣士方其法以議獄訟獄訟成士師受中所謂官師之斷其獄􅁦其訟于朝羣士司刑皆在各麗之也以成}
  - {type: variant, offset: 1529, length: 0, content: '', WYG: 周禮鄉士遂士縣士方士各職聴于朝司冦聴之㫁其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中所謂官師以成之也}
