  - {type: variant, offset: 564, length: 1, content: 宮, SBCK: 宫月乃擇元辰月令孟春之公九卿諸侯大夫躬耕帝籍天子三推三公天子親載耒耜措之于參保介之御間帥三東鄉躬桑祭義曰天子為籍千畝冕而朱紘五推卿諸侯九推又季春之日后妃齋戒親事天地山川社稷先古以為醴酪齊盛於是躬秉耒諸侯為籍百畝冕而青絃躬秉耒以桑蠶室近川而為之築宫仞有三尺􅁄牆而乎取之敬之至也又古者天子諸侯必有公夫人世婦之吉者使入􅁞於􅁞室奉種浴于外閉之及大昕之朝君皮弁素積卜三官之籍田而漢制皇后亦帥公卿諸侯夫人蠶此川桑于公桑風戾以食之至漢文帝常詔開農桑也所謂興}
  - {type: page-break, offset: 564, content: '', id: KR3a0011_SBCK_001-4a}
  - {type: variant, offset: 564, length: 1, content: 宮, WYG: 宫月令孟春之月乃擇元辰天子親載耒耜棤之于參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推又季春之日后妃齋戒親東鄉躬桑祭義曰天子為籍千畆冕而朱紘躬秉耒諸侯為籍百畆冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是取之敬之至也又古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻而外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶室奉種浴于川桑于公桑風戾以食之至漢文帝常詔開籍田而漢制皇后亦帥公卿諸侯夫人蠶此所謂興農桑也}
  - {type: variant, offset: 564, length: 1, content: 宮, krp: 宫月乃擇元辰月令孟春之公九卿諸侯大夫躬耕帝籍天子三推三公天子親載耒耜措之于參保介之御間帥三東鄉躬桑祭義曰天子為籍千畝冕而朱紘五推卿諸侯九推又季春之日后妃齋戒親事天地山川社稷先古以為醴酪齊盛於是躬秉耒諸侯為籍百畝冕而青絃躬秉耒以桑蠶室近川而為之築宫仞有三尺棘牆而乎取之敬之至也又古者天子諸侯必有公夫人世婦之吉者使入𧖟於𧖟室奉種浴于外閉之及大昕之朝君皮弁素積卜三官之籍田而漢制皇后亦帥公卿諸侯夫人蠶此川桑于公桑風戾以食之至漢文帝常詔開農桑也所謂興}
