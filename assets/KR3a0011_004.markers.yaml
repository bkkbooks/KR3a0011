  - {type: variant, offset: 1103, length: 0, content: '', SBCK: 先生也髙祖欲易太子大臣多爭四公東園公綺里季夏黄公角里不能致者遂使人奉太子書迎至及宴置酒未能得堅决吕后以留侯計云四公皆上所言其姓名上廼驚曰吾求公避逃我今公何太子侍四人者從太子上怪問四人前對各義不辱故恐而亡匿今聞太子仁孝恭敬愛自從吾兒遊乎四人曰陛下輕士善罵臣等上曰煩公幸卒調護太子四人趨去上目送士天下莫不延頸願為太子死者故臣等來輔羽翼已成難動矣竟不易太子所謂屈於之召戚夫人指視曰我欲易之彼四人為之四公商山}
  - {type: page-break, offset: 1103, content: '', id: KR3a0011_SBCK_004-7a}
  - {type: variant, offset: 1103, length: 0, content: '', WYG: 四公東園公綺里季夏黄公角里先生也髙祖欲易太子太臣多爭未能得堅决吕后以留侯計云四公皆上所不能致者遂使人奉太子書迎至及宴置酒太子侍四人者從太子上怪問四人前對各言其姓名上乃驚曰吾求公避逃我今公何自從吾兒逰乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調䕶太子四人趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣竟不易太子所謂屈於商山四公}
  - {type: page-break, offset: 1103, content: '', id: KR3a0011_WYG_004-6b, image: WYG0696/WYG0696-0455d.png}
