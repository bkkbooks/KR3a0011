  - {type: variant, offset: 1130, length: 0, content: '', SBCK: 書時交阯太守張恢坐臧徵還伏尚書鍾離意也顯宗即位徴為尚璣悉以委地而不拜賜帝怪而問其故對曰法以資物簿入大司農詔班賜羣臣意得珠母之閭惡其名也此臧穢之寶誠不敢拜帝臣聞孔子忍渴於盗泉之水曽參回車於勝賜意轉為尚書僕射車駕數幸廣盛苑意以嗟嘆曰清乎尚書之言乃更以庫錢三十萬事天子即時還宫所謂屈於鍾離尚書為從禽廢政常當車陳諫般樂遊田之}
  - {type: page-break, offset: 1130, content: '', id: KR3a0011_SBCK_004-7b}
