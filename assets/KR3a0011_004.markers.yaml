  - {type: variant, offset: 457, length: 0, content: '', SBCK: 祟在髙山廣水欲齊大旱景公卜之宫殿􅁀露與靈山河伯共憂其幸而雨乎於祠靈山河伯以禱晏子曰祠之無益君誠避天果大雨民盡得種樹是景公出野􅁀露三日}
  - {type: page-break, offset: 457, content: '', id: KR3a0011_SBCK_004-3b}
