  - {type: variant, offset: 1286, length: 0, content: '', SBCK: 巫蠱郡邸獄時宣帝生數月以武帝末吉以故廷尉監徴詔治厚女徒令保養曾孫置閒燥處望氣者言長皇曾孫坐衛太子事繫吉哀曾孫無辜擇謹門拒使者得全曾孫曾孫病吉數敕乳母加安獄中有天子氣上遣使令一切殺之吉閉自曾孫遭遇吉絕口不道前思至宫婢則自致醫藥視遇甚有恩惠以私財物給其衣食見問然後知吉有舊恩而終不言上大賢之陳嘗有阿保之功辭引使者丙吉知狀上親吉為博陽侯制詔丞相封}
  - {type: variant, offset: 1286, length: 0, content: '', WYG: 武帝末吉以故廷尉監徴詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉哀曾孫無辜擇謹厚女徒令保養曾孫置閒燥處望氣者言長安獄中有天子氣上遣使令一切殺之吉閉門拒使者得全曽孫曾孫病吉數敕乳母加致醫藥視遇甚有恩惠以私財物給其衣食自曽孫遭遇吉絶口不道前恩至宫婢則自陳甞有阿保之功辭引使者丙吉知狀上親見問然後知吉有舊恩而終不言上大賢之制詔丞相封吉為博陽侯}
