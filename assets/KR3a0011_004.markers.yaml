  - {type: variant, offset: 700, length: 0, content: '', SBCK: 羿滅夏氏時少康方在相后懷姙帝相之后有仍國君女也寒浞殺有舊臣靡自有鬲氏收二國之燼舉兵滅浞乃奔歸有仍之國而生少康長為仍牧正夏少康而立}
