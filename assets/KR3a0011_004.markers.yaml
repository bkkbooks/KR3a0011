  - {type: variant, offset: 449, length: 0, content: '', SBCK: 年太史占之湯時大旱七人禱吾請自當遂齋戒翦髪㫁爪素車白馬曰當以人禱湯曰吾所為請雨者民也若以犧禱于桑林之野身嬰白茅以身為}
  - {type: variant, offset: 449, length: 0, content: '', WYG: 湯時大旱七年太史占之曰當以人禱湯曰吾所為請雨者民也若以人禱吾請自當遂齋戒剪髪斷爪素車白馬身嬰白茅以身為犧禱于桑林之野}
  - {type: variant, offset: 449, length: 0, content: '', krp: 年太史占之湯時大旱七人禱吾請自當遂齋戒翦髪㫁爪素車白馬曰當以人禱湯曰吾所為請雨者民也若以犧禱于桑林之野身嬰白茅以身為}
  - {type: punctuation, offset: 453, content: ，, id: KR3a0011_CHANT_004-bkkpn120}
  - {type: 'tls:seg', offset: 453, content: '', id: KR3a0011_CHANT_004-4a.14}
  - {type: variant, offset: 453, length: 0, content: '', SBCK: 繹史曰利於民邾文公卜遷干生民而樹之君以利之也民既利矣孤必與而不利於君邾子曰苟利於民孤之利也天養民死之短長時也民苟利矣遷也吉莫如焉左右曰命可長也君何弗為邾子曰命在月邾文公卒之遂遷于繹五}
  - {type: variant, offset: 453, length: 0, content: '', WYG: 邾文公卜遷于繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒}
  - {type: variant, offset: 453, length: 0, content: '', krp: 繹史曰利於民邾文公卜遷干生民而樹之君以利之也民既利矣孤必與而不利於君邾子曰苟利於民孤之利也天養民死之短長時也民苟利矣遷也吉莫如焉左右曰命可長也君何弗為邾子曰命在月邾文公卒之遂遷于繹五}
