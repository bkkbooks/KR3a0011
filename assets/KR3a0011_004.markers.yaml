  - {type: variant, offset: 1396, length: 0, content: '', SBCK: 自武帝始婕妤之號稱也班婕妤者彪之姑况之女也入後宫始位視上卿爵比列侯婕言接幸於上也妤美欲與婕妤同輦載辭止太后以樊姬擬之婕為少使俄而大幸為婕妤居増成舍成帝嘗后婕妤祝詛後宫詈及主上皇后坐廢婕妤妤每進見上䟽依則古禮至趙飛燕譛告許乃求共養太后長信宫以善對免因恐久見危}
  - {type: variant, offset: 1396, length: 0, content: '', WYG: 婕妤之號自武帝始位視上卿爵比列侯婕言接幸於上也妤美稱也班婕妤者彪之姑况之女也入後宫始為少使俄而大幸為婕妤居増成舍成帝嘗欲與婕妤同輦載辭止太后以樊姬擬之婕妤每進見上疏依則古禮至趙飛燕譖告許后婕妤祝詛後宫詈及主上皇后坐廢婕妤以善對免因恐久見危乃求共養太后長信宫}
  - {type: variant, offset: 1396, length: 0, content: '', krp: 自武帝始婕妤之號稱也班婕妤者彪之姑况之女也入後宫始位視上卿爵比列侯婕言接幸於上也妤美欲與婕妤同輦載辭止太后以樊姬擬之婕為少使俄而大幸為婕妤居増成舍成帝嘗后婕妤祝詛後宫詈及主上皇后坐廢婕妤妤每進見上䟽依則古禮至趙飛燕譛告許乃求共養太后長信宫以善對免因恐久見危}
