  - {type: variant, offset: 1360, length: 0, content: '', SBCK: 夫人也戚氏戚留守希見益䟽屢欲立戚夫人子如意為太髙帝愛幸戚夫人常從之關東吕后年長常鉗衣赭衣令舂未幾鴆殺趙王遂斷戚夫人子不果髙帝崩吕后乃令永巷囚戚夫人髠使居鞠域中名曰人彘手足去眼熏耳飲瘖藥}
  - {type: page-break, offset: 1360, content: '', id: KR3a0011_SBCK_004-10a}
  - {type: variant, offset: 1360, length: 0, content: '', WYG: 戚氏戚夫人也髙帝愛幸戚夫人常從之關東吕后年長常留守希見益疏屢欲立戚夫人子如意為太子不果髙帝崩吕后乃令永巷囚戚夫人髠鉗衣赭衣令舂未幾鴆殺趙王遂斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘}
  - {type: variant, offset: 1360, length: 0, content: '', krp: 夫人也戚氏戚留守希見益䟽屢欲立戚夫人子如意為太髙帝愛幸戚夫人常從之關東吕后年長常鉗衣赭衣令舂未幾鴆殺趙王遂斷戚夫人子不果髙帝崩吕后乃令永巷囚戚夫人髠使居鞠域中名曰人彘手足去眼熏耳飲瘖藥}
