  - {type: variant, offset: 1368, length: 0, content: '', krp: 顔師古曰昭顯其儀示隆重也趙昭儀者孝元帝始加昭儀之號位視丞相爵比諸侯王居昭陽舘顓寵十餘年成帝崩民間歸罪昭成皇后趙飛燕女弟也后寵衰而絶幸昭儀起居發病狀昭儀自殺儀皇太后詔治問皇帝}
