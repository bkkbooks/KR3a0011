  - {type: variant, offset: 1391, length: 0, content: '', SBCK: 坐袁盎引郤慎夫人夫人怒上亦怒盎曰孝文所幸慎夫人在禁中嘗與皇后同席人乃妾耳豈可同坐陛下獨不見人彘乎上臣聞尊卑有序則上下和今既已立后慎夫人賜盎金五十斤悦乃召語慎夫人夫}
  - {type: page-break, offset: 1391, content: '', id: KR3a0011_SBCK_004-11a}
  - {type: variant, offset: 1391, length: 0, content: '', WYG: 孝文所幸慎夫人在禁中嘗與皇后同席坐袁盎引卻慎夫人夫人怒上亦怒盎曰臣聞尊卑有序則上下和今既已立后慎夫人乃妾耳豈可同坐陛下獨不見人彘乎上悦乃召語慎夫人夫人賜盎金五十斤}
