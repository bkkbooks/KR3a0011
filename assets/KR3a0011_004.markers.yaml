  - {type: variant, offset: 1402, length: 0, content: '', SBCK: 馬皇明德生肅宗帝命貴人養之撫育過於所生後有后伏波將軍援之少女為顯宗貴人時賈氏郎其人也遂立為皇后愈自謙肅能誦易好司奏立長秋宫皇太后曰馬貴人德冠後官裙不加縁每於侍執之際輒言及政事多所讀春秋楚詞尤喜周官董仲舒書常衣大練故寵敬日隆始終無衰毘補而未嘗以家私干}
  - {type: variant, offset: 1402, length: 0, content: '', WYG: 明德馬皇后伏波將軍援之少女為顯宗貴人時賈氏生肅宗帝命貴人養之撫育過於所生後有司奏立長秋宫皇太后曰馬貴人徳冠後宫即其人也遂立為皇后愈自謙肅能誦易好讀春秋楚辭尤喜周官董仲舒書常衣大練裙不加縁每於侍執之際輒言及政事多所毘補而未嘗以家私干故寵敬日隆始終無衰}
