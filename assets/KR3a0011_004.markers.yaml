  - {type: variant, offset: 1558, length: 0, content: '', SBCK: 言及戰吕錡射恭王中目敗於鄢陵成公十六年楚子救鄭不聽申叔之少主社稷生十年而䘮先君未及習師保之至襄公十三年楚子疾告大夫曰不榖不徳辱社稷為大夫憂其弘多矣若以大夫之靈教訓而應受多福是以不徳而亡師于鄢以以從先君於禰廟者請為靈若厲大夫擇焉獲保首領以殁於地唯是春秋窀穸之事所遺言也此所謂}
  - {type: page-break, offset: 1558, content: '', id: KR3a0011_SBCK_004-12b}
  - {type: variant, offset: 1558, length: 0, content: '', WYG: 成公十六年楚子救鄭不聴申叔之言及戰吕錡射恭王中目敗於鄢陵至襄公十三年楚子疾告大夫曰不穀不徳少主社稷生十年而䘮先君未及習師保之教訓而應受多福是以不徳而亡師於鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君于禰廟者請為靈若厲大夫擇焉此所謂遺言也}
