  - {type: variant, offset: 1385, length: 0, content: '', SBCK: 謂否則災也按靈帝何貴言戚氏昭儀栗姬鉤弋所王美人任娠畏后乃服藥欲除之而胎安不人甚有寵幸性彊忌光和三年立為皇后時至董卓立獻帝乃遷何皇后於永安宫亦酖動後生皇子協即獻帝也何皇后酖殺美人顯言故申漢前事以為鑒戒弑之悦以美人獻帝母也不得}
  - {type: variant, offset: 1385, length: 0, content: '', WYG: 言戚氏昭儀栗姬鉤弋所謂否則災也按靈帝何貴人甚有寵幸性彊忌光和三年立為皇后時王美人姙娠畏后乃服藥欲除之而胎安不動後生皇子協即獻帝也何皇后酖殺美人至董卓立獻帝乃遷何皇后於永安宫亦酖弑之悦以美人獻帝母也不得顯言故申漢前事以為鑒戒}
