  - {type: variant, offset: 507, length: 0, content: '', SBCK: 指原隰之祗古者立國天子諸侯大社者五土之神稷者於五土之中特羊傳云亡國之社掩其上柴其下孟子曰民夫皆立社而國喪則屋之不受天陽也故公之重民為欽奉天命以保社稷也為貴社稷次之君為輕言三君者}
  - {type: variant, offset: 507, length: 0, content: '', WYG: 社者五土之神稷者於五土之中特指原隰之祇古者立國天子諸侯大夫皆立社而國䘮則屋之不受天陽也故公羊傳云亡國之社掩其上柴其下孟子曰民為貴社稷次之君為輕言三君者之重民為欽奉天命以保社稷也}
