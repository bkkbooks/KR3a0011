  - {type: variant, offset: 1142, length: 0, content: '', SBCK: 子曰堯舜采椽不二世曰吾聞之韓觳於此禹鑿龍門通大夏決河亭水放之海刮茅茨不翦飯土塯啜土􅄱雖監門之養不凡所為貴有天下者得肆意極欲主重明法身自持築臿脛毋毛臣虜之勞不烈於此矣為天子親處窮苦之實以徇百姓尚何於法下不敢為非以制御海内矣夫虞夏之主貴笑唐虞也此所謂非}
  - {type: variant, offset: 1142, length: 0, content: '', WYG: 二世曰吾聞之韓子曰堯舜采椽不刮茅茨不翦飯土塯啜土形雖監門之養不觳於此禹鑿龍門通大夏決河亭水放之海身自持築臿脛毋毛臣虜之勞不烈於此矣凡所為貴有天下者得肆意極欲主重明法下不敢為非以制御海内矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何於法此所謂非笑唐虞也}
  - {type: variant, offset: 1142, length: 0, content: '', krp: 子曰堯舜采椽不二世曰吾聞之韓觳於此禹鑿龍門通大夏決河亭水放之海刮茅茨不翦飯土塯啜土形雖監門之養不凡所為貴有天下者得肆意極欲主重明法身自持築臿脛毋毛臣虜之勞不烈於此矣為天子親處窮苦之實以徇百姓尚何於法下不敢為非以制御海内矣夫虞夏之主貴笑唐虞也此所謂非}
