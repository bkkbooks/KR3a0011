  - {type: variant, offset: 1112, length: 1, content: 強, SBCK: 强}
  - {type: variant, offset: 1112, length: 1, content: 強, WYG: 强項令陳留董宣為雒陽令湖陽公主蒼頭白日殺人宣於夏門亭格殺之主訴帝帝召宣欲箠殺之宣曰陛下聖徳中興而縱奴殺人將何以治天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯因敕强項令出賜錢三十萬所謂屈於强}
