  - {type: variant, offset: 1124, length: 0, content: '', WYG: 屈於鍾離尚書尚書鍾離意也顯宗即位徴為尚書時交阯太守張恢坐贓徵還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盗泉之水曽參回車於勝母之閭惡其名也此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書僕射車駕數幸廣成苑意以為從禽廢政常當車陳諫般樂逰田之事天子即時還宫所謂}
