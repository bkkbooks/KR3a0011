  - {type: variant, offset: 1374, length: 0, content: '', SBCK: 立齊景帝妃栗姬妬而景帝諸美人皆因長公主見得栗姬男為太子長公主嫖有女欲與太子為長公主日譖栗姬景帝心銜之而未發也王貴幸栗姬日怨怒謝長主不許㑹薄皇后廢奏事文曰子以母貴母以子貴今太子母號夫人又隂使人趣六臣立栗姬為皇后大行為臨江王栗姬愈恚不得見以憂死冝為皇后帝怒遂案誅大行而廢太子}
  - {type: variant, offset: 1374, length: 0, content: '', WYG: 景帝立齊栗姬男為太子長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許㑹薄皇后廢長公主日譖栗姬景帝心銜之而未發也王夫人又隂使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒遂案誅大行而廢太子為臨江王栗姬愈恚不得見以憂死}
  - {type: variant, offset: 1374, length: 0, content: '', krp: 立齊景帝妃栗姬妬而景帝諸美人皆因長公主見得栗姬男為太子長公主嫖有女欲與太子為長公主日譖栗姬景帝心銜之而未發也王貴幸栗姬日怨怒謝長主不許㑹薄皇后廢奏事文曰子以母貴母以子貴今太子母號夫人又隂使人趣六臣立栗姬為皇后大行為臨江王栗姬愈恚不得見以憂死冝為皇后帝怒遂案誅大行而廢太子}
