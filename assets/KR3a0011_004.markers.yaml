  - {type: variant, offset: 1381, length: 0, content: '', SBCK: 為倢伃居鉤弋宫大有寵元始鉤弋夫人姓趙氏昭帝母也進帝命其所生門曰堯母門後欲立鉤弋子為三年生昭帝號鉤弋子任身十四月乃生武猶豫久之鉤弋夫人從幸甘泉有過見譴以皇太子以其年穉母少恐女主顓恣亂國家葬雲陽憂死因}
  - {type: variant, offset: 1381, length: 0, content: '', WYG: 鉤弋夫人姓趙氏昭帝母也進為倢伃居鉤弋宫大有寵元始三年生昭帝號鉤弋子姙身十四月乃生武帝命其所生門曰堯母門後欲立鉤弋子為皇太子以其年穉母少恐女主顓恣亂國家猶豫久之鉤弋夫人從幸甘泉有過見譴以憂死因葬雲陽}
  - {type: variant, offset: 1381, length: 0, content: '', krp: 為倢伃居鉤弋宫大有寵元始鉤弋夫人姓趙氏昭帝母也進帝命其所生門曰堯母門後欲立鉤弋子為三年生昭帝號鉤弋子任身十四月乃生武猶豫久之鉤弋夫人從幸甘泉有過見譴以皇太子以其年穉母少恐女主顓恣亂國家葬雲陽憂死因}
