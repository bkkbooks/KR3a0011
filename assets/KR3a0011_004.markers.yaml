  - {type: 'tls:seg', offset: 1155, content: '', id: KR3a0011_CHANT_004-7a.15}
  - {type: variant, offset: 1155, length: 0, content: '', SBCK: 王歸國稱定陶太后成帝無繼嗣太后賂趙傅太后元帝倢伃也生定陶恭王元帝崩隨王妃明年徴定陶王為六子是為哀帝帝即昭儀隂為恭王子求漢嗣又以從弟晏子為孟子喜中叔子晏幼君子商同母弟鄭煇子位累尊太后為皇太太后太后父同産弟子后語至謂之嫗䧟馮太后以祝詛罪令自殺業俱封侯太后既尊後尤驕與成帝母王太王母復奏發傅太后􅃁以木棺代去珠玉衣哀帝崩王莽秉政奏貶傅太后號為定陶恭合浦宗族皆歸故郡趙皇后亦廢為庶人歸定陶葬恭王􅃁次孔鄉侯晏將家屬徙}
  - {type: page-break, offset: 1155, content: '', id: KR3a0011_SBCK_004-8a}
  - {type: variant, offset: 1155, length: 0, content: '', WYG: 傅太后元帝倢伃也生定陶恭王元帝崩隨王歸國稱定陶太后成帝無繼嗣太后賂趙昭儀隂為恭王子求漢嗣又以從弟晏子為王妃明年徴定陶王為太子是為哀帝帝即位累尊太后為皇太太后太后父同產弟子孟子喜中叔子晏㓜君子商同母弟鄭煇子業俱封侯太后既尊後尤驕與成帝母王太后語至謂之嫗䧟馮太后以祝詛罪令自殺哀帝崩王莽秉政奏貶傅太后號為定陶恭王母復奏發傅太后冡以木棺代去珠玉衣歸定陶葬恭王冡次孔鄉侯晏將家屬徙合浦宗族皆歸故郡趙皇后亦廢為庶人}
  - {type: page-break, offset: 1155, content: '', id: KR3a0011_WYG_004-7b, image: WYG0696/WYG0696-0456b.png}
