  - {type: variant, offset: 727, length: 0, content: '', SBCK: 越王勾踐乃以餘兵五千人保棲於㑹稽夫差二年吳王悉精兵以伐越敗之夫椒妾至十四年勾踐伐吳虜太子友二十一年使大夫種因吳太宰嚭而行成請委國爲臣差自剄死越王滅吳夫}
  - {type: variant, offset: 727, length: 0, content: '', WYG: 夫差二年吳王悉精兵以伐越敗之夫椒越王勾踐乃以餘兵五千人保棲于㑹稽使大夫種因吳太宰嚭而行成請委國為臣妾至十四年勾踐伐吳虜太子友二十一年越王滅吳夫差自剄死}
