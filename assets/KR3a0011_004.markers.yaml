  - {type: variant, offset: 673, length: 0, content: '', SBCK: 扁舟浮於江湖變名易姓范蠡既雪㑹稽之恥乃乗與時逐三致千金而再散分與貧友昆弟後適齊為鴟夷子皮之陶為朱公廼治産積居遂至鉅萬故言富者稱陶朱年衰老聽子孫􅁱業而息之}
  - {type: variant, offset: 673, length: 0, content: '', WYG: 范蠡既雪㑹稽之耻乃乗扁舟浮於江湖變名易姓適齊為鴟夷子皮之陶為朱公乃治産積居與時逐三致千金而再散分與貧友昆弟後年衰老聴子孫脩業而息之遂至鉅萬故言富者稱陶朱}
