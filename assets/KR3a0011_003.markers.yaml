  - {type: variant, offset: 0, length: 391, content: 俗嫌第三俗嫌第三或問卜筮曰德斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損或問曰時群忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈故甲子昧爽殷滅周興咸陽之地秦亡漢隆或問五三之位周應也龍虎之會晉祥也曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也或曰然則日月可廢歟曰否曰元辰先王所用也人承天地故動靜順焉順其陰陽順其日辰順其度數內有順實外有順文文實順理也休徵之符自然應也故盜泉朝歌孔墨不由惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也故精以底之犧牲玉帛以昭祈請吉朔以通之禮云禮云玉帛云乎哉請云祈云酒膳云乎哉非其禮則或愆非其請則不應或問祈請可否曰氣物應感則可性命自然則否或問避疾厄有諸曰夫疾厄何為者也非身則神身不可避神不可逃可避非身可逃非神也持身隨天萬里不逸譬諸孺子掩目巨夫之掖而曰逃可乎, WYG: ''}
