  - {type: variant, offset: 0, length: 190, content: 雜言下第五雜言下第五衣裳服者不昧於塵塗愛也衣裳愛焉而不愛其容止外矣容止愛焉而不愛其言行末矣言行愛焉而不愛其明淺矣故君子本神為貴神和德平而道通是為保真人之所以立德者三一曰貞二曰達三曰志貞以為質達以行之志以成之君子哉必不得已也守一於茲貞其主也人之所以立檢者四誠其心正其志實其事定其分心誠則神明應之況於萬民乎志正則天地順之況於萬物乎事實則功立分定則不淫曰才之實也行可為才不可也曰古之所以, WYG: ''}
