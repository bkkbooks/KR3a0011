  - {type: variant, offset: 191, length: 2034, content: 才也本今之所謂才也末也然則以行之貴也無失其才而才有失先民有言適楚而北轅者曰吾馬良用多御善此三者益侈其去楚亦遠矣遵路而騁應方而動君子有行行必至矣或問聖人所以為貴者才乎曰合而用之以才為貴分而行之以行為貴舜禹之才而不為邪甚於矣舜禹之仁雖亡其才不失為良人哉或問進諫受諫孰難曰後之進諫難也以受之難故也若受諫不難則進諫斯易矣或問知人自知孰難曰自知者求諸內而近者也知人者求諸外而遠者也知人難哉若極其數也明有內以識有外以暗全有內以隱有外以顯然則知人自知人則可以自知未可以知人也急哉用己者不為異則異矣君子所惡乎異者三好生事也好生奇也好變常也好生事則多端而動眾好生奇則離道而惑俗好變常則輕法而亂度故名不貴苟傳行不貴苟難權為茂矣其幾不若經辯為美矣其理不若絀文為顯矣其中不若樸博為盛矣其正不若約莫不為道知道之體大之至也莫不為妙知神之幾妙之至也莫不為正知之正之至也故君子必存乎三至弗至斯有守無誖焉或問守曰聖典而已矣若夫百家者是謂無守莫不為言要其至矣莫不為德玄其奧矣莫不為道聖人其弘矣聖人之道其中道乎是為九達或曰辭達而已矣聖人以文其隩也有五曰玄曰妙曰包曰要曰文幽深謂之玄理微謂之妙數博謂之包辭約謂之要章成謂之文聖人之文成此五者故曰不得已君子樂天知命故不憂審物明辨故不惑定心致公故不懼若乃所憂懼則有之憂己不能成天性也懼己惑之憂不能免天命無惑焉或問性命曰生之謂性也形神是也所以立生終生者之謂命也吉凶是也夫生我之制性命存焉爾君子循其性以輔其命休斯承否斯守無務焉無怨焉好寵者乘天命以驕好惡者違天命以濫故驕則奉之不成濫則守之不終好以取怠惡以取甚務以取福惡以成禍斯惑矣或問天命人事曰有三品焉上下不移其中則人事存焉爾命相近也事相遠也則吉凶殊矣故曰窮理盡性以至於命孟子稱性善荀卿稱性惡公孫子曰性無善惡揚雄曰人之性善惡渾劉向曰性情相應性不獨善情不獨惡曰問其理曰性善則無四凶性惡則無三仁人無善惡文王之教一也則無周公管蔡性善情惡是桀紂無性而堯舜無情也性善惡皆渾是上智懷惠而下愚挾善也理也未究矣唯向言為然或曰仁義性也好惡情也仁義常善而好惡或有惡故有情惡也曰不然好惡者性之取舍也實見於外故謂之情爾必本乎性矣仁義者善之誠者也何嫌其常善好惡者善惡未有所分也何怪其有惡凡言神者莫近於氣有氣斯有形有神斯有好惡喜怒之情矣故人有情由氣之有形也氣有白黑神有善惡形與白黑偕情與善惡偕故氣黑非形之咎情惡非情之罪也或曰人之於利見而好之能以仁義為節者是性割其情也性少情多性不能割其情則情獨行為惡矣曰不然是善惡有多少也非情也有人於此嗜酒嗜肉肉勝則食焉酒勝則飲焉此二者相與爭勝者行矣非情欲得酒性欲得肉也有人於此好利好義義勝則義取焉利勝則利取焉此二者相與爭勝者行矣非情欲得利性欲得義也其可兼者則兼取之其不可兼者則隻取重焉若苟隻好而已雖可兼取矣若二好鈞平無分輕重則一俯一仰乍進乍退或曰請折於經曰易稱乾道變化各正性命是言萬物各有性也觀其所感而天地萬物之情可見矣是言情者應感而動者也昆蟲草木皆有性焉不盡善也天地聖人皆稱情焉不主惡也又曰爻彖以情言亦如之凡情意心志者皆性動之別名也情見乎辭是稱情也言不盡意是稱意也中心好之是稱心也以制其志是稱志也惟所宜各稱其名而已情何主惡之有故曰必也正名或曰善惡皆性也則法教何施曰性雖善待教而成性雖惡待法而消唯上智下愚不移其次善惡交爭於是教扶其善法抑其惡得施之九品從教者半畏刑者四分之三其不移大數九分之一也一分之中又有微移者矣然則法教之於化民也幾盡之矣及法教之失也其為亂亦如之或曰法教得則治法教失則亂若無得無失縱民之情則治亂其中乎曰凡陽性升陰性降升難而降易善陽也惡陰也故善難而惡易縱民之情使自由之則降於下者多矣曰中焉在曰法教不純有得有失則治亂其中矣純德無慝其上善也伏而不動其次也動而不行行而不遠遠而能復又其次也其下者遠而不近也凡此皆人性也制之者則心也動而抑之行而止之與上同性也行而弗止遠而弗近與下同終也君子嘉仁而不責惠尊禮而不責意貴德而不責怨其責也先己而行也先人淫惠曲意私怨此三者實枉貞道亂大德然成敗得失莫匪由之救病不給其竟奚暇於道德哉此之謂末俗故君子有常交曰義也有常誓曰信也交而後親誓而後故狹矣太上不異古今其次不異海內同天下之志者其盛德乎大人之志不可見也浩然而同於道眾人之志不可掩也察然而流於俗同於道故不與俗浮沈或曰脩行者不為人恥諸神明其至也乎曰未也自恥者本也恥諸神明其次也恥諸人外矣夫唯外則慝積於內矣故君子審乎自恥或曰恥者其志者乎曰未也夫志者自然由人何恥之有赴谷必墜失水必溺人見之也赴穽必陷失道必沈人不見之也不察之故君子慎乎所不察不聞大論則志不弘不聽至言則心不固思唐虞於上世瞻仲尼於中古而知夫小道者之足羞也想伯夷於首陽省四皓於商山而知夫穢志者之足恥也存張騫於西極念蘇武於朔垂而知懷閭室者之足鄙也推斯類也無所不至矣德比於上欲比於下德比於上故知恥欲比於下故知足恥而知之則聖賢其可幾知足而已則固陋其可安也聖賢斯幾況其為慝乎固陋斯安況其為侈乎是謂有檢純乎純哉其上也其次得概而已矣莫匪概也得其概苟無邪斯可矣君子四省其身怒不亂德喜不義也, WYG: ''}
