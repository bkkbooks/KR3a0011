body:
  text: 俗嫌第三俗嫌第三或問卜筮曰德斯益否斯損曰何謂也吉而濟凶而救之謂益吉而恃凶而怠之謂損或問曰時群忌曰此天地之數也非吉凶所生也東方主生死者不鮮西方主殺生者不寡南方火也居之不燋北方水也蹈之不沈故甲子昧爽殷滅周興咸陽之地秦亡漢隆或問五三之位周應也龍虎之會晉祥也曰官府設陳富貴者值之布衣寓焉不符其爵也獄犴若居有罪者觸之貞良入焉不受其罰也或曰然則日月可廢歟曰否曰元辰先王所用也人承天地故動靜順焉順其陰陽順其日辰順其度數內有順實外有順文文實順理也休徵之符自然應也故盜泉朝歌孔墨不由惡其名者順其心也苟無其實徼福於忌斯成難也或曰祈請者誠以接神自然應也故精以底之犧牲玉帛以昭祈請吉朔以通之禮云禮云玉帛云乎哉請云祈云酒膳云乎哉非其禮則或愆非其請則不應或問祈請可否曰氣物應感則可性命自然則否或問避疾厄有諸曰夫疾厄何為者也非身則神身不可避神不可逃可避非身可逃非神也持身隨天萬里不逸譬諸孺子掩目巨夫之掖而曰逃可乎或問人形有相曰蓋有之焉夫神氣形容之相包也自然矣貳之於行參之於時相成也亦參相敗也其數眾矣其變多矣亦有上中下品云爾或問神僊之術曰誕哉末之也已矣聖人弗學非惡生也終始運也短長數也運數非人力之為也曰亦有僊人乎曰僬僥桂莽產乎異俗就有仙人亦殊類矣或問有數百歲人乎曰力稱烏獲捷言羌亥勇期賁育聖云仲尼壽稱彭祖物有俊傑不可誣也或問凡壽者必有道非習之功曰夫惟壽則惟能用道惟能用道則性壽矣苟非其性也脩不至也學必至聖可以盡性壽必用道所以盡命或曰人有自變化而僊者信乎曰未之前聞也然則異也非僊也男化為女者有矣死人復生者有矣夫豈人之性哉氣數不存焉或問曰有養性乎曰養性秉中和守之以生而已愛親愛德愛力愛神之謂嗇否則不宣過則不澹故君子節宣其氣勿使有所壅閉滯底昏亂百度則生疾故喜怒哀樂思慮必得其中所以養神也寒暄虛盈消息必得其中所以養體也善治氣者由禹之治水也若夫導引蓄氣歷藏內視過則失中可以治疾皆非養性之聖術也夫屈者以乎申也蓄者以乎虛也內者以乎外也氣宜宣而遏之體宜調而矯之神宜平而抑之必有失和者矣夫善養性者無常術得其和而已矣鄰臍二寸謂之關關者所以關藏呼吸之氣以稟授四體也故氣長者以關息氣短者其息稍升其脈稍促其神稍越至於以肩息而氣舒其神稍專至於以關息而氣衍矣故道者常致氣於關是謂要術凡陽氣生養陰氣消殺和喜之徒其氣陽也故養性者崇其陽而絀其陰陽極則亢陰極則凝亢則有悔凝則有凶夫物不能為春故候天春而生人則不然存吾春而已矣藥者療也所以治疾也無疾則勿藥可也肉不勝食氣況於藥乎寒斯熱熱則致滯陰藥之用也唯適其宜則不為害若己氣平也則必有傷唯鍼火亦如之故養性者不多服也唯在乎節之而已矣或問仁者壽何謂也曰仁者內不傷性外不傷物上不違天下不違人處正居中形神以和故咎徵不至而休嘉集之壽之術也曰顏冉何曰命也麥不終夏花不濟春如和氣何雖云其短長亦在其中矣或問黃白之儔曰傅毅論之當也燔埴為瓦則可爍瓦為銅則不可以自然驗於不然詭哉敵犬羊之肉以造馬牛不幾矣不其然歟世稱緯書仲尼之作也臣悅叔父故司空爽辨之蓋發其偽也有起於中興之前終張之徒之作乎或曰雜曰以己雜仲尼乎以仲尼雜己乎若彼者以仲尼雜己而已然則可謂八十一首非仲尼之作矣或曰燔諸曰仲尼之作則否有取焉則可曷其燔在上者不受虛言不聽浮術不采華名不興偽事言必有用術必有典名必有實事必有功
