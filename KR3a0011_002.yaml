body:
  text: 時事第二時事第二最凡有二十一首其初二首尚知貴敦也其二首有申重可舉者十有九事一曰明考試二曰公卿不拘為郡二千石不拘為縣三曰置上武之官四曰議州牧五曰生刑而死者但加肉刑六曰德刑並用七曰避讎有科八曰議祿九曰議專地十曰議錢貨十一曰約祀舉重十二曰天人之應十三曰月正聽朝十四曰崇內教十五曰備博士十六曰至德要道十七曰禁數赦令十八曰正尚主之制十九曰復外內注記者盤庚遷殷革奢即約化而裁之與時消息衆寡盈虛不常厥道尚知貴敦古今之法也民寡則用易足土廣則物易生事簡則業易定厭亂則思治創難則思靜或曰三皇之民至敦也其治至清也天性乎曰皇民敦秦民弊時也山民朴市民玩處也桀紂不易民而亂湯武不易民而治政也皇民寡寡斯敦皇治純純斯清矣惟性不求無益之物不蓄難得之貨節華麗之飾退利進之路則民俗清矣簡小忌去淫祀絶奇怪則妖僞息矣致精誠求諸己正大事則神明應矣放邪說去淫智抑百家崇聖典則道義定矣去浮華舉功實絶末伎同本務則事業修矣誰毀誰譽譽其有試者萬事之概量也以茲舉者試其事處斯職者考其績賞罰失實以惡反之人焉飾哉語曰盜跖不能盜田尺寸寸不可盜況尺乎夫事驗必若土田之張於野也則為私者寡矣若亂之墜於澳也則可信者解矣故有事考功有言考用動則考行靜則考守公卿不為郡二千石不為縣未是也小能其職以極登於大故下位競大橈其任以墜於下故上位慎其鼎覆刑焉何憚於降若夫千里之任不能充於郡而縣邑之功廢惜矣哉不以過職絀則勿降所以優賢也以過職絀則降所以懲愆也孝武皇帝以四夷未賓寇賊姦宄初置武功賞官以寵戰士若今依此科而崇其制置尚武之官以司馬兵法選位秩比博士講司馬之典簡搜狩之事掌軍功爵賞小統於五校大統於太尉既周時務禮亦宜之周之末葉兵革繁矣莫亂於秦民不荒殄今國家忘戰日久每寇難之作民瘁幾盡不教民戰是謂棄之信矣或問曰州牧刺史監察御史三制孰優曰時制而已曰天下不既定其牧乎曰古諸侯建國家世位權柄存焉於是置諸侯之賢者以牧總其紀綱而已不統其政不御其民今郡縣無常權輕不固而州牧秉其權重勢異於古非所以強幹弱枝也而無益治民之實監察御史斯可也若權時之宜則異論也肉刑古也或曰復之乎曰古者人民盛焉今也至寡整衆以威撫寡以寬道也復刑非務必也生刑而極死者復之可也自古肉刑之除也斬右趾者死也惟復肉刑是謂生死而息民問德刑並用常典也或先或後時宜刑教不行勢極也教初必簡刑始必略事漸也教化之隆莫不興行然後責備刑法之定莫不避罪然後求密未可以備謂之虛教未可以密謂之峻刑虛教傷化峻刑害民君子弗由也設必違之教不量民力之未能是招民於惡也故謂之傷化設必犯之法不度民情之不堪是陷民於罪也故謂之害民莫不興行則一毫之善可得而勸也然後教備莫不避罪則纖介之惡可得而禁也然後刑密或問復讎古義也曰縱復讎可乎曰不可曰然則如之何曰有縱有禁有生有殺制之以義斷之以法是謂義法並立曰何謂也曰依古復讎之科使父讎避諸異州千里兄弟之讎避諸異郡五百里從父從兄弟之讎避諸異縣百里弗避而報者無罪避而報之殺犯王禁者罪也復讎者義也以義報罪從王制順也犯制逆也以逆順生殺之凡以公命行止者不為弗避或問祿曰古之祿也備漢之祿也輕夫祿必稱位一物不稱非制也公祿貶則私利生私利生則廉者匱而貪者豐也夫豐貪生私匱廉貶公是亂也先王重之曰祿可增乎曰民家財愆增之宜矣或曰今祿如何曰時匱也祿依食食依民參相淡必也正貪祿省間冗與時消息昭惠恤下損益以度可也諸侯不專封富人民田踰限富過公侯是自封也大夫不專地人賣買由己是專地也或曰復井田與曰否專地非古也井田非今也然則如之何曰耕而勿有以俟制度可也或問貨曰五銖之制宜矣曰今廢如之何曰海內既平行之而已曰錢散矣京畿虛矣其勢必積於遠方若果行之則彼以無用之錢市吾有用之物是匱近而豐遠也曰事勢有不得官之所急者穀也牛馬之禁不得出百里之外若其他物彼以其錢取之於左用之於右貿遷有無周而通之海內一家何患焉曰錢寡矣曰錢寡民易矣若錢既通而不周於用然後官鑄而補之或曰收民之藏錢者輸之官牧遠輸之京師然後行之曰事枉而難實者欺慢必衆奸僞必作爭訟必繁刑殺必深吁嗟紛擾之聲章乎天下矣非所以撫遺民成緝熙也曰然則收而積之與曰通市其可也或曰改鑄四銖曰難矣或曰遂廢之曰錢實便於事用民樂行之禁之難今開難令以絶便事禁民所樂不茂矣曰起而行之錢不可如之何曰尚之廢之弗得已何憂焉聖王先成民而後致力於神民事未定郡祀有闕不為尤矣必也舉其重而祀之望祀五嶽四瀆其神之祀縣有舊常若今郡祀之而其祀禮物從鮮可也禮重本示民不偷且昭典物其備物以豐年日月之災降異非舊也天人之應所由來漸矣故履霜堅冰非一時也仲尼之禱非一朝也且日食行事或稠或曠一年二交非其常也洪範傳云六沴作見若是王都未見之無聞焉爾官修其方而先王之禮保章視祲安宅敘降必書雲物為備故也太史上事無隱焉勿寢可也天子南面聽天下嚮明而治蓋取諸離天之道也月正聽朝國家之大事也宜正其儀以明舊典古有掌陰陽之禮之官以教後宮掌婦學之法婦德婦言婦功各率其屬而以時御序于王先王禮也宜崇其教以先內政覽列圖誦列傳遵典行內史執其彤管記善書過考行黜陟以章好惡男女正位乎內外正家而天下定矣故二儀立而大業成君子之道匪闕終日造次必於是備博士廣太學而祀孔子焉禮也仲尼作經本一而已古今文不同而皆自謂真本經古今先師義一而已異家別說不同而皆自謂古今仲尼邈而靡質昔先師沒而無聞將誰使折之者秦之滅學也書藏於屋壁義絶於朝野逮至漢興收托散滯固已無全學矣文有磨滅言有楚夏出有先後或學者先意有所借定後進相放彌以滋蔓故一源十流天水違行而訟者紛如也藝不俱是比而論之必有可參者焉或曰至德要道約爾典籍甚富如而博之以求約也語有之曰有鳥將來張羅待之得鳥者一目也今為一目之羅無時得鳥矣道雖要也非博無以通矣博其方約其說赦令權也或曰有制乎曰權無制制其義不制其事巽以行權義制也權者反經無事也問其象曰無妄之災大過凶其象矣不得已而行之禁其屢也曰絶之乎曰權曰宜弗之絶也尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮也以陰乘陽違天也以婦凌夫違人也違天不祥違人不義古者天子諸侯有事必告于廟朝有二史左史記言右史記動動為春秋言為尚書君舉必記臧否成敗無不存焉下及士庶等各有異咸在載籍或欲顯而不得或欲隱而名章得失一朝而榮辱千載善人勸焉淫人懼焉故先王重之以嗣賞罰以輔法教宜於今者官以其日各書其盡歲盡則集之於尚書若史官使掌典其事不書詭常為善惡則書言行足以為法式則書立功事則書兵戎動衆則書四夷朝獻則書皇后貴人太子拜立則書公主大臣拜免則書福淫禍亂則書祥瑞災異則書先帝故事有起居注日用動靜之節必書焉宜復其式內史掌之以紀內事
